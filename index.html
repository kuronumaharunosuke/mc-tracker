<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Action Tracker 2627</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

<!-- Firebase v10 compat -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root{
--bg:#F3F4F7;--bg2:#EAEBF0;--border:#CACCD1;--text:#52565E;--dim:#8A8E96;
--faint:#CACCD1;--white:#ffffff;--dark:#2e3138;
--done:#00C16E;--done-bg:#E5F9F0;--wip:#F48924;--wip-bg:#FEF3E8;
--ns-bg:#F3F4F7;--danger:#F85A40;--aiesec:#037EF3;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;}
.app{display:flex;min-height:100vh;}

/* ── AUTH SCREEN ── */
#auth-screen{
  position:fixed;inset:0;z-index:9000;background:var(--dark);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
}
#auth-screen.hidden{display:none;}
#auth-loading{position:fixed;inset:0;z-index:9001;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#auth-loading.hidden{display:none;}
.auth-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#FFC845;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-loading-txt{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase;}

.auth-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:48px 40px 40px;width:100%;max-width:420px;text-align:center;animation:authIn .3s ease;}
@keyframes authIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.auth-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:16px;}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:.9;color:#fff;letter-spacing:.04em;margin-bottom:6px;}
.auth-logo span{color:#FFC845;}
.auth-sub{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.3);margin-bottom:36px;letter-spacing:.06em;}
.auth-divider{height:1px;background:rgba(255,255,255,.08);margin-bottom:28px;}
.auth-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;color:#2e3138;border:none;border-radius:8px;padding:14px 20px;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.auth-btn:hover{background:#f0f2f5;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2);}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.auth-notice{margin-top:18px;font-size:11px;color:rgba(255,255,255,.25);line-height:1.6;}
.auth-notice strong{color:rgba(255,255,255,.45);}
.auth-error{margin-top:14px;background:rgba(248,90,64,.15);border:1px solid rgba(248,90,64,.3);border-radius:6px;padding:10px 14px;font-size:12px;color:#F85A40;font-weight:700;display:none;}
.auth-error.show{display:block;}



/* ── SIDEBAR ── */
.sidebar{width:210px;min-width:210px;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;background:var(--dark);z-index:100;overflow-y:auto;}
.logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
.logo-eye{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:6px;}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:#fff;letter-spacing:.04em;}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.3);margin-top:5px;}
.nav{flex:1;padding-top:6px;}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:10px 16px 4px;}
.nav-item{display:flex;align-items:center;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:700;gap:9px;color:rgba(255,255,255,.55);transition:background .1s,color .1s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;}
.ndot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.nb{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.28);}
.sidebar-foot{border-top:1px solid rgba(255,255,255,.08);padding:12px;display:flex;flex-direction:column;gap:6px;}

/* User badge */
.user-badge{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.06);border-radius:6px;}
.user-avatar{width:26px;height:26px;border-radius:50%;background:var(--aiesec);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden;}
.user-avatar img{width:100%;height:100%;object-fit:cover;}
.user-info{flex:1;overflow:hidden;}
.user-name{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-email{font-family:'DM Mono',monospace;font-size:8px;color:rgba(255,255,255,.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.signout-btn{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.4);border-radius:4px;transition:all .1s;width:100%;}
.signout-btn:hover{border-color:rgba(248,90,64,.5);color:#F85A40;}

/* ── TOPBAR ── */
.main{margin-left:210px;flex:1;}
.topbar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(82,86,94,.06);}
.topbar-l{display:flex;align-items:center;gap:12px;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.04em;color:var(--dark);line-height:1;}
.page-sub{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);}
.topbar-r{display:flex;align-items:center;gap:8px;}
.search-box{display:flex;align-items:center;gap:8px;border:1.5px solid var(--border);background:var(--bg);padding:6px 12px;border-radius:6px;transition:border-color .1s;}
.search-box:focus-within{border-color:var(--text);}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Lato',sans-serif;font-size:12px;width:160px;}
.search-box input::placeholder{color:var(--faint);}
.btn{font-family:'Lato',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:7px 16px;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text);border-radius:6px;transition:all .1s;}
.btn:hover{border-color:var(--text);background:var(--bg);}
.btn-fill{background:var(--dark);color:#fff;border-color:var(--dark);}
.btn-fill:hover{background:#3d4350;border-color:#3d4350;}
.btn-sm{font-size:10px;padding:5px 11px;}

/* ── CONTENT ── */
.content{padding:28px;}

/* ── DASHBOARD ── */
.dash-hero{background:var(--dark);border-radius:10px;padding:28px 32px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;}
.dh-title{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:.9;color:#fff;letter-spacing:.04em;}
.dh-title span{color:#FFC845;}
.dh-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:10px;letter-spacing:.06em;}
.dh-right{text-align:right;}
.dh-pct{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;color:#fff;}
.dh-pct-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;}
.dh-total{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:18px 20px;}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;}
.stat-n.g{color:var(--done);}.stat-n.a{color:var(--wip);}.stat-n.d{color:var(--faint);}
.stat-l{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-top:2px;}
.section-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.area-tbl{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px;}
.area-tbl th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--dim);text-align:left;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);}
.area-tbl td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
.area-tbl tr:last-child td{border-bottom:none;}
.area-tbl tbody tr{cursor:pointer;transition:background .08s;}
.area-tbl tbody tr:hover td{background:var(--bg);}
.an{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;}
.prog-wrap{display:flex;align-items:center;gap:10px;}
.prog-track{height:4px;background:var(--bg2);border-radius:2px;width:100px;position:relative;}
.prog-fill{height:100%;border-radius:2px;position:absolute;left:0;top:0;}
.prog-n{font-family:'Bebas Neue',sans-serif;font-size:18px;min-width:38px;}
.bdn{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;}
.gn{color:var(--done);}.an2{color:var(--wip);}
.up-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px;}
.up-head{grid-column:1/-1;background:var(--dark);color:#fff;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:11px 16px;}
.dl-card{padding:14px 16px;background:var(--white);}
.dl-card:hover{background:var(--bg);}
.dl-area{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;}
.dl-task{font-size:13px;font-weight:700;margin-bottom:8px;line-height:1.4;}
.dl-foot{display:flex;align-items:center;gap:8px;}
.dl-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);}
.dl-date.ov{color:var(--danger);font-weight:700;}

/* Audit log */
.audit-list{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.audit-head{background:var(--dark);color:#fff;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;}
.audit-item{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.audit-item:last-child{border-bottom:none;}
.audit-avatar{width:22px;height:22px;border-radius:50%;background:var(--aiesec);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;flex-shrink:0;}
.audit-body{flex:1;}
.audit-who{font-size:11px;font-weight:700;color:var(--dark);}
.audit-what{font-size:11px;color:var(--dim);margin-top:1px;}
.audit-when{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);margin-top:2px;}
.audit-action{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 6px;border-radius:3px;margin-left:6px;}
.audit-action.add{background:#E5F9F0;color:var(--done);}
.audit-action.edit{background:#FEF3E8;color:var(--wip);}
.audit-action.del{background:#FEE;color:var(--danger);}
.audit-action.status{background:var(--bg2);color:var(--dim);}
.audit-empty{padding:20px 16px;font-size:11px;color:var(--faint);text-align:center;}

/* ── CHIPS ── */
.chip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 9px;display:inline-flex;align-items:center;gap:5px;border-radius:4px;cursor:pointer;user-select:none;transition:opacity .1s;white-space:nowrap;border:none;}
.chip:hover{opacity:.78;}
.chip.done{color:var(--done);background:var(--done-bg);}
.chip.wip{color:var(--wip);background:var(--wip-bg);}
.chip.ns{color:var(--dim);background:var(--ns-bg);}

/* ── FILTER BAR ── */
.fbar{display:flex;align-items:center;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.fl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-right:4px;}
.fb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:5px 12px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);color:var(--dim);transition:all .08s;border-radius:5px;}
.fb:hover{border-color:var(--text);color:var(--text);}
.fb.active{background:var(--dark);color:#fff;border-color:var(--dark);}
.fr{margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;}

/* ── KPI BLOCK ── */
.kpi-block{background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden;}
.kpi-head{display:flex;align-items:stretch;cursor:pointer;transition:background .08s;}
.kpi-head:hover{background:var(--bg);}
.kpi-idx{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;width:64px;text-align:center;border-right:1px solid var(--border);padding:12px 0;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.kpi-info{flex:1;padding:12px 16px;}
.kpi-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:3px;}
.kpi-ttl{font-size:13px;font-weight:700;line-height:1.4;color:var(--dark);}
.kpi-target{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:3px;}
.kpi-r{padding:12px 16px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:6px;flex-shrink:0;}
.kpi-pct{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
.kpi-bar{width:80px;height:4px;background:var(--bg2);border-radius:2px;}
.kpi-bar-f{height:100%;border-radius:2px;}
.kpi-cnt{font-size:10px;color:var(--dim);}
.kpi-chev{width:40px;border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:18px;transition:transform .14s;flex-shrink:0;}
.kpi-chev.open{transform:rotate(90deg);}

/* ── TASK TABLE ── */
.kpi-body{display:none;border-top:1px solid var(--border);}
.kpi-body.open{display:block;}
.tt{width:100%;border-collapse:collapse;}
.tt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);text-align:left;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg);}
.tt td{padding:10px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tr:last-child td{border-bottom:none;}
.tr:hover td{background:var(--bg);}
.tn{font-size:13px;font-weight:700;color:var(--dark);}
.tres{font-size:11px;color:var(--dim);}
.tdt{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);white-space:nowrap;}
.tdt.ov{color:var(--danger);font-weight:700;}
.ta{display:flex;gap:4px;opacity:0;transition:opacity .08s;}
.tr:hover .ta{opacity:1;}
.ib{font-size:11px;padding:4px 8px;border:1px solid var(--border);cursor:pointer;color:var(--dim);transition:all .08s;background:transparent;border-radius:4px;}
.ib:hover{border-color:var(--text);color:var(--text);}
.ib.del:hover{border-color:var(--danger);color:var(--danger);}
.add-r td{padding:9px 16px;border-bottom:none;}
.add-btn{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:color .08s;background:none;border:none;}
.add-btn:hover{color:var(--text);}
.group-cell{font-size:11px;font-weight:700;color:var(--dark);background:var(--bg);border-right:1px solid var(--border);padding:10px 12px;vertical-align:middle;max-width:120px;}
.group-cell-label{background:var(--bg2);border-radius:4px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--text);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px;}
.group-cell.empty{background:transparent;}
.tby{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);white-space:nowrap;}

/* ── FREE PROJECTS ── */
.proj-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.proj-color-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0;}
.proj-name{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.04em;color:var(--dark);}
.proj-meta{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.proj-block{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.proj-block-head{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:10px;background:var(--bg);}
.proj-block-title{font-size:13px;font-weight:900;color:var(--dark);flex:1;}
.proj-block-stats{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);}

/* Free project list (dashboard view) */
.fp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px;}
.fp-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;transition:box-shadow .1s,transform .1s;position:relative;overflow:hidden;}
.fp-card:hover{box-shadow:0 4px 16px rgba(82,86,94,.1);transform:translateY(-2px);}
.fp-card-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;}
.fp-card-name{font-size:14px;font-weight:900;color:var(--dark);margin-bottom:6px;padding-left:12px;}
.fp-card-desc{font-size:11px;color:var(--dim);margin-bottom:10px;padding-left:12px;line-height:1.5;}
.fp-card-stats{display:flex;gap:8px;align-items:center;padding-left:12px;}
.fp-card-pct{font-family:'Bebas Neue',sans-serif;font-size:20px;}
.fp-card-bar{height:3px;background:var(--bg2);border-radius:2px;flex:1;}
.fp-card-bar-f{height:100%;border-radius:2px;}

/* ── GANTT ── */
.gantt-wrap{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.gantt-toolbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap;}
.gantt-legend{display:flex;align-items:center;gap:14px;font-size:11px;font-weight:700;margin-right:auto;}
.gl-item{display:flex;align-items:center;gap:5px;}
.gl-dot{width:10px;height:10px;border-radius:2px;}
.gantt-filter{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.gfb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);color:var(--dim);transition:all .08s;border-radius:4px;}
.gfb:hover{border-color:var(--text);color:var(--text);}
.gfb.active{background:var(--dark);color:#fff;border-color:var(--dark);}
.gantt-scroll{overflow-x:auto;}
.gantt-inner{min-width:800px;}
.gantt-head{display:flex;position:sticky;top:56px;z-index:20;background:var(--bg);border-bottom:2px solid var(--border);}
.g-name-hd{width:260px;min-width:260px;padding:10px 16px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);border-right:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;}
.g-res-hd{width:90px;min-width:90px;padding:10px 8px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);border-right:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;}
.g-timeline-hd{flex:1;display:flex;flex-direction:column;}
.g-month-row{display:flex;border-bottom:1px solid var(--border);}
.g-month-hd{text-align:center;font-size:9px;font-weight:700;letter-spacing:.1em;padding:8px 4px;color:var(--dim);border-right:1px solid var(--border);}
.g-day-row{position:relative;height:22px;overflow:hidden;background:var(--bg);}
.g-day-tick{position:absolute;transform:translateX(-50%);top:3px;display:flex;flex-direction:column;align-items:center;gap:1px;pointer-events:none;}
.g-day-tick-line{width:1px;height:5px;background:var(--border);}
.g-day-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);white-space:nowrap;line-height:1;}
.g-area-row{display:flex;align-items:center;border-bottom:2px solid var(--border);border-top:2px solid var(--border);margin-top:4px;}
.g-area-hd{width:260px;min-width:260px;padding:10px 16px;display:flex;align-items:center;gap:10px;border-right:1px solid var(--border);flex-shrink:0;}
.g-area-label{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;}
.g-area-count{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;}
.g-area-res{width:90px;min-width:90px;border-right:1px solid var(--border);flex-shrink:0;}
.g-area-chart{flex:1;position:relative;height:36px;}
.g-row{display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:38px;transition:background .07s;}
.g-row:hover{background:var(--bg);}
.g-name{width:260px;min-width:260px;padding:7px 16px;font-size:12px;font-weight:700;color:var(--dark);border-right:1px solid var(--border);display:flex;align-items:center;gap:6px;overflow:hidden;flex-shrink:0;cursor:pointer;}
.g-name-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.g-res{width:90px;min-width:90px;padding:7px 8px;font-size:10px;color:var(--dim);border-right:1px solid var(--border);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex-shrink:0;}
.g-chart{flex:1;position:relative;height:38px;}
.g-grid{position:absolute;inset:0;display:flex;pointer-events:none;}
.g-grid-col{flex:1;border-right:1px solid var(--bg2);}
.g-bar{position:absolute;height:18px;border-radius:3px;min-width:3px;transition:opacity .1s;}
.g-today{position:absolute;top:0;bottom:0;width:2px;z-index:5;pointer-events:none;background:#F85A40;opacity:.7;}

/* NOTE CELL */
.tnote{font-size:11px;color:var(--dim);line-height:1.4;max-width:180px;word-break:break-all;}
.tnote-empty{color:var(--faint);font-size:10px;cursor:pointer;}
.tnote-empty:hover{color:var(--text);}
textarea.fi{resize:vertical;min-height:60px;font-size:12px;line-height:1.5;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(46,49,56,.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.overlay.open{display:flex;}
.modal{background:var(--white);border:1px solid var(--border);border-radius:10px;width:480px;max-width:calc(100vw - 32px);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(46,49,56,.2);animation:popIn .15s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.mh{background:var(--dark);color:#fff;padding:16px 20px;border-radius:10px 10px 0 0;font-size:14px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;}
.mb{padding:20px;}
.fg{margin-bottom:14px;}
.fl2{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:5px;}
.fi,.fs{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--dark);font-size:13px;font-family:'Lato',sans-serif;padding:8px 11px;outline:none;transition:border-color .1s;border-radius:6px;}
.fi:focus,.fs:focus{border-color:var(--text);background:var(--white);}
.fs{cursor:pointer;}
option{background:var(--white);}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mf{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--bg);border-radius:0 0 10px 10px;}

/* Color picker */
.color-picker{display:flex;gap:8px;flex-wrap:wrap;}
.color-swatch{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.selected{border-color:var(--dark);box-shadow:0 0 0 2px #fff inset;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:10px 16px;font-size:12px;font-weight:700;z-index:2000;animation:slideUp .18s ease;border-radius:6px;box-shadow:0 4px 16px rgba(46,49,56,.2);}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.toast.err{background:var(--danger);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── PRIORITY ── */
.pri{display:inline-block;font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:3px;white-space:nowrap;}
.pri.high{background:#FEE2E2;color:#DC2626;}
.pri.medium{background:#FEF3E8;color:#F48924;}
.pri.low{background:var(--bg2);color:var(--dim);}

/* ── SUBTASK ── */
.sub-row td{background:#FAFBFC;padding:7px 16px;}
.sub-row:hover td{background:var(--bg);}
.sub-indent{padding-left:32px !important;display:flex;align-items:center;gap:6px;}
.sub-toggle{background:none;border:none;cursor:pointer;color:var(--faint);font-size:12px;padding:0 2px;transition:transform .12s,color .1s;line-height:1;}
.sub-toggle:hover{color:var(--text);}
.sub-toggle.open{transform:rotate(90deg);}
.sub-add{font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;cursor:pointer;background:none;border:none;padding:5px 16px 5px 48px;display:block;transition:color .08s;}
.sub-add:hover{color:var(--text);}

/* ── COMMENTS PANEL ── */
.cp{position:fixed;top:0;right:-400px;width:380px;bottom:0;background:var(--white);border-left:1px solid var(--border);z-index:500;display:flex;flex-direction:column;transition:right .22s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 24px rgba(46,49,56,.1);}
.cp.open{right:0;}
.cp-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--dark);}
.cp-title{font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:.06em;}
.cp-close{background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;line-height:1;padding:0 2px;}
.cp-close:hover{color:#fff;}
.cp-task{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg);}
.cp-task-name{font-size:12px;font-weight:700;color:var(--dark);}
.cp-task-area{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-top:2px;}
.cp-list{flex:1;overflow-y:auto;padding:12px 0;}
.cp-empty{padding:20px;text-align:center;font-size:11px;color:var(--faint);}
.cp-msg{padding:10px 20px;display:flex;gap:10px;}
.cp-avatar{width:24px;height:24px;border-radius:50%;background:var(--aiesec);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0;}
.cp-bubble{flex:1;}
.cp-who{font-size:11px;font-weight:700;color:var(--dark);margin-bottom:3px;}
.cp-text{font-size:12px;color:var(--text);line-height:1.5;word-break:break-word;}
.cp-when{font-family:'DM Mono',monospace;font-size:9px;color:var(--faint);margin-top:3px;}
.cp-foot{border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;align-items:flex-end;}
.cp-foot textarea{flex:1;background:var(--bg);border:1.5px solid var(--border);color:var(--dark);font-size:12px;font-family:'Lato',sans-serif;padding:8px 10px;outline:none;border-radius:6px;resize:none;min-height:36px;max-height:100px;line-height:1.4;transition:border-color .1s;}
.cp-foot textarea:focus{border-color:var(--text);}
.cp-send{background:var(--dark);color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
.cp-send:hover{background:#3d4350;}
.cp-count{font-size:10px;font-weight:700;color:var(--dim);cursor:pointer;display:inline-flex;align-items:center;gap:3px;border:none;background:none;padding:3px 6px;border-radius:3px;transition:background .08s;}
.cp-count:hover{background:var(--bg2);}
.cp-overlay{position:fixed;inset:0;z-index:499;display:none;}
.cp-overlay.open{display:block;}

/* ── DEADLINE BANNER ── */
.dl-banner{background:#FFF3CD;border:1px solid #F48924;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px;}
.dl-banner-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.dl-banner-body{flex:1;}
.dl-banner-title{font-size:12px;font-weight:900;color:#92400E;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
.dl-banner-items{display:flex;flex-wrap:wrap;gap:6px;}
.dl-banner-item{font-size:11px;background:#fff;border:1px solid #F48924;border-radius:4px;padding:3px 8px;color:#92400E;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;transition:background .08s;text-align:left;}
.dl-banner-item:hover{background:#FFF3CD;}
.dl-banner-item.over{border-color:var(--danger);color:var(--danger);background:#FFF5F5;}
.dl-banner-item.over:hover{background:#FFE9E9;}
.dl-banner-close{background:none;border:none;color:#92400E;cursor:pointer;font-size:16px;opacity:.5;padding:0;flex-shrink:0;}
.dl-banner-close:hover{opacity:1;}

/* ── SYNC INDICATOR ── */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--faint);display:inline-block;margin-left:6px;transition:background .3s;}
.sync-dot.syncing{background:#F48924;animation:pulse .8s infinite;}
.sync-dot.ok{background:var(--done);}
.sync-dot.err{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>

const AUDIT_LIMIT = 20;
let auditCache = [];

async function logAction(action, detail){
  // action: 'add' | 'edit' | 'del' | 'status'
  if(!db || !currentUser) return;
  const entry = {
    uid:         currentUser.uid,
    email:       currentUser.email,
    displayName: currentUser.displayName||currentUser.email,
    action,
    detail,
    ts: firebase.firestore.FieldValue.serverTimestamp(),
  };
  try{
    await db.collection('audit_log').add(entry);
    // update cache for dashboard
    auditCache.unshift({...entry, ts:{toDate:()=>new Date()}});
    if(auditCache.length>AUDIT_LIMIT) auditCache.pop();
  }catch(e){}
}

async function fetchAuditLog(){
  if(!db) return [];
  try{
    const snap = await db.collection('audit_log')
      .orderBy('ts','desc').limit(AUDIT_LIMIT).get();
    auditCache = snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){ auditCache=[]; }
  return auditCache;
}

function renderAuditLog(container){
  if(!auditCache.length){
    container.innerHTML='<div class="audit-empty">まだ操作履歴がありません</div>';
    return;
  }
  container.innerHTML = auditCache.map(e=>{
    const init=(e.displayName||e.email||'?')[0].toUpperCase();
    let ts='—';
    try{ const d=e.ts?.toDate?e.ts.toDate():new Date(e.ts); ts=d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(_){}
    const ac={'add':'add','edit':'edit','del':'del','status':'status'}[e.action]||'edit';
    const al={'add':'追加','edit':'編集','del':'削除','status':'状態変更'}[e.action]||e.action;
    return `<div class="audit-item">
      <div class="audit-avatar">${init}</div>
      <div class="audit-body">
        <div class="audit-who">${h(e.displayName||e.email)}<span class="audit-action ${ac}">${al}</span></div>
        <div class="audit-what">${h(e.detail)}</div>
        <div class="audit-when">${ts}</div>
      </div>
    </div>`;
  }).join('');
}

// ── SYNC ──
const DB_DOC = 'tracker/v2627';
let _saving = false, _saveTimer = null, _syncUnsub = null;

function setSyncDot(state){ // 'syncing'|'ok'|'err'|''
  const d=document.getElementById('sync-dot');
  if(d){d.className='sync-dot'+(state?' '+state:'');}
}

function save(){
  try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}
  if(!db)return;
  clearTimeout(_saveTimer);
  setSyncDot('syncing');
  _saveTimer=setTimeout(async()=>{
    _saving=true;
    try{
      await db.doc(DB_DOC).set(D);
      setSyncDot('ok');
      setTimeout(()=>setSyncDot(''),3000);
    }catch(e){
      console.error('Firestore save error',e);
      setSyncDot('err');
    }
    setTimeout(()=>{ _saving=false; },600);
  },800);
}

function initSync(){
  if(_syncUnsub) _syncUnsub();
  _syncUnsub = db.doc(DB_DOC).onSnapshot(snap=>{
    if(_saving) return;
    if(!snap.exists){
      db.doc(DB_DOC).set(D);
      return;
    }
    const remote=snap.data();
    if(JSON.stringify(remote)===JSON.stringify(D))return;
    D=remote;
    migrate();
    try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}
    buildNav();
    // re-render current view
    if(view==='dashboard')rDash();
    else if(view==='gantt')rGantt();
    else if(aid)rArea(aid);
    else if(fpid)rFreeProject(fpid);
    setSyncDot('ok');
    setTimeout(()=>setSyncDot(''),2000);
  },err=>{
    console.error('onSnapshot error',err);
    setSyncDot('err');
  });
}


function gid(){return 'x'+Date.now()+'_'+Math.random().toString(36).slice(2,5);}
function h(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fd(s){if(!s)return'—';const d=new Date(s);if(isNaN(d))return s;return(d.getMonth()+1)+'/'+(d.getDate());}
function isOver(dl){if(!dl)return false;const d=new Date(dl);return !isNaN(d)&&d<new Date();}
function sl(s){return s==='DONE'?'Done':s==='WIP'?'WIP':'Not Started';}
function sc(s){return s==='DONE'?'done':s==='WIP'?'wip':'ns';}
function si(s){return s==='DONE'?'✓':s==='WIP'?'◑':'';}
function priLabel(p){return p==='high'?'高':p==='medium'?'中':p==='low'?'低':'';}
function priHtml(p){if(!p)return'';return`<span class="pri ${p}">${priLabel(p)}</span>`;}

// Comment count cache: {taskId: number}
let _ccache = {};
async function loadCommentCounts(taskIds){
  if(!db||!taskIds.length)return;
  for(const tid of taskIds){
    try{
      const snap=await db.collection('comments').where('taskId','==',tid).get();
      _ccache[tid]=snap.size;
    }catch(e){ _ccache[tid]=0; }
  }
}
function ccBadge(tid){
  const n=_ccache[tid]||0;
  return `<button class="cp-count" onclick="openComments('${tid}',event)">${n>0?n+' コメント':'コメント'}</button>`;
}
function taskStats(t){
  let d=0,w=0,n=0,tot=0;
  function count(x){tot++;if(x.status==='DONE')d++;else if(x.status==='WIP')w++;else n++;(x.children||[]).forEach(c=>count(c));}
  count(t);return{done:d,wip:w,ns:n,total:tot};
}
function aStats(area){
  let d=0,w=0,n=0,t=0;
  area.kpis.forEach(k=>k.tasks.forEach(task=>{const s=taskStats(task);d+=s.done;w+=s.wip;n+=s.ns;t+=s.total;}));
  // エリアスコープのプロジェクトも含める
  D.freeProjects.filter(p=>p.areaId===area.id).forEach(p=>{const s=pStats(p);d+=s.done;w+=s.wip;n+=s.ns;t+=s.total;});
  return{done:d,wip:w,ns:n,total:t,pct:t?Math.round(d/t*100):0};
}
function pStats(proj){
  let d=0,w=0,n=0,t=proj.tasks.length;
  proj.tasks.forEach(task=>{if(task.status==='DONE')d++;else if(task.status==='WIP')w++;else n++;});
  return{done:d,wip:w,ns:n,total:t,pct:t?Math.round(d/t*100):0};
}
function totals(){
  let d=0,w=0,n=0,t=0;
  D.areas.forEach(a=>{const s=aStats(a);d+=s.done;w+=s.wip;n+=s.ns;t+=s.total;}); // area-scoped PJTs included via aStats
  D.freeProjects.filter(p=>!p.areaId).forEach(p=>{const s=pStats(p);d+=s.done;w+=s.wip;n+=s.ns;t+=s.total;}); // グローバルのみ
  return{done:d,wip:w,ns:n,total:t,pct:t?Math.round(d/t*100):0};
}

// ── NAV ──
function buildNav(){
  document.getElementById('anav').innerHTML=D.areas.map(a=>{
    const s=aStats(a);const c=COLORS[a.id]||'#52565E';
    return `<div class="nav-item" data-view="area-${a.id}" onclick="sw('area-${a.id}',this)">
      <div class="ndot" style="background:${c}"></div>${a.name}<span class="nb">${s.pct}%</span>
    </div>`;
  }).join('');
  document.getElementById('fpnav').innerHTML=D.freeProjects.filter(p=>!p.areaId).map(p=>{
    const s=pStats(p);
    return `<div class="nav-item" data-view="fp-${p.id}" onclick="sw('fp-${p.id}',this)">
      <div class="ndot" style="background:${p.color||'#037EF3'}"></div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h(p.name)}</span>
      <span class="nb">${s.pct}%</span>
    </div>`;
  }).join('');
  document.querySelectorAll('.nav-item').forEach(n=>{
    const active=n.dataset.view===view;
    n.classList.toggle('active',active);
    if(active && n.dataset.view.startsWith('area-'))
      n.style.borderLeftColor=COLORS[n.dataset.view.replace('area-','')]||'#fff';
    else if(active && n.dataset.view.startsWith('fp-')){
      const p=D.freeProjects.find(x=>x.id===n.dataset.view.replace('fp-',''));
      n.style.borderLeftColor=p?.color||'#037EF3';
    } else n.style.borderLeftColor='transparent';
  });
}

function sw(v, el){
  view=v; aid=null; fpid=null; fil='ALL';
  buildNav();
  const kpiBtn=document.getElementById('addkpibtn');
  const addBtn=document.getElementById('addbtn');
  const ptBtn=document.getElementById('addprojtaskbtn');
  kpiBtn.style.display='none'; addBtn.style.display='none'; ptBtn.style.display='none';
  if(v==='dashboard'){
    document.getElementById('ptitle').textContent='DASHBOARD';
    document.getElementById('psub').textContent='';
    rDash();
  } else if(v==='gantt'){
    document.getElementById('ptitle').textContent='GANTT';
    document.getElementById('psub').textContent='Feb → Sep 2026';
    rGantt();
  } else if(v.startsWith('area-')){
    aid=v.replace('area-','');
    const a=D.areas.find(x=>x.id===aid);
    document.getElementById('ptitle').textContent=a.name;
    document.getElementById('psub').textContent='AREA · '+a.kpis.length+' KPIs';
    addBtn.style.display=''; kpiBtn.style.display='';
    rArea(aid);
  } else if(v.startsWith('fp-')){
    fpid=v.replace('fp-','');
    const p=D.freeProjects.find(x=>x.id===fpid);
    if(!p)return;
    document.getElementById('ptitle').textContent=p.name;
    document.getElementById('psub').textContent='PROJECT';
    ptBtn.style.display='';
    rFreeProject(fpid);
  }
}

// ── DEADLINE BANNER ──
let _bannerDismissed = false;
function deadlineBanner(){
  if(_bannerDismissed)return'';
  const today=new Date(),soon=new Date();soon.setDate(today.getDate()+3);
  let items=[];
  D.areas.forEach(a=>a.kpis.forEach(k=>k.tasks.forEach(t=>{
    if(!t.deadline||t.status==='DONE')return;
    const d=new Date(t.deadline);
    if(!isNaN(d)&&d<=soon) items.push({name:t.name,areaId:a.id,fpId:null,deadline:t.deadline,over:d<today});
  })));
  D.freeProjects.forEach(p=>p.tasks.forEach(t=>{
    if(!t.deadline||t.status==='DONE')return;
    const d=new Date(t.deadline);
    if(!isNaN(d)&&d<=soon) items.push({name:t.name,areaId:p.areaId||null,fpId:p.id,deadline:t.deadline,over:d<today});
  }));
  if(!items.length)return'';
  items.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const badges=items.map(it=>{
    const nav=it.areaId&&!it.fpId ? `sw('area-${it.areaId}',null)` : it.fpId ? `sw('fp-${it.fpId}',null)` : '';
    const areaLabel=it.areaId?` [${it.areaId}]`:'';
    return `<button class="dl-banner-item${it.over?' over':''}" title="${h((it.areaId||it.fpId||'')+(it.over?' · 期限超過':''))}" onclick="${nav}">${h(it.name.slice(0,22))}${areaLabel} · ${fd(it.deadline)}</button>`;
  }).join('');
  return `<div class="dl-banner" id="dl-banner">
    <div class="dl-banner-icon">!</div>
    <div class="dl-banner-body">
      <div class="dl-banner-title">直近3日以内の締め切り (${items.length}件)</div>
      <div class="dl-banner-items">${badges}</div>
    </div>
    <button class="dl-banner-close" onclick="document.getElementById('dl-banner').remove();_bannerDismissed=true">×</button>
  </div>`;
}

  return `<tr class="tr" id="row-${t.id}">
    ${grpHtml}

    <td class="tres">${h(t.res||'—')}</td>
    <td class="tdt">${fd(t.start)}</td>
    <td class="tdt${over?' ov':''}">${fd(t.deadline)}${over?' ！':''}</td>
    <td><span class="chip ${sc(t.status)}" onclick="${onCyc}">${si(t.status)?si(t.status)+' ':''}${sl(t.status)}</span></td>
    <td class="tnote">${t.note?h(t.note).replace(/\n/g,'<br>'):`<span class="tnote-empty" onclick="${onEdit}">+ メモ</span>`}</td>
    <td>${ccBadge(t.id)}</td>
    <td class="tby">${h(t._by||'')}</td>
    <td><div class="ta"><button class="ib" onclick="${onEdit}">編集</button><button class="ib del" onclick="${onDel}">削除</button>${hasSub?'':`<button class="ib" onclick="addSubTask('${aId}','${kId}','${t.id}',event)">+ サブ</button>`}</div></td>
  </tr>`;
}

function subRows(t, aId, kId, c){
  if(!(t.children||[]).length) return '';
  let html=`<tr id="sub-container-${t.id}" style="display:none"><td colspan="9" style="padding:0">`;
  html+=`<table style="width:100%;border-collapse:collapse">`;
  t.children.forEach(ch=>{
    const over=isOver(ch.deadline)&&ch.status!=='DONE';
    html+=`<tr class="tr sub-row" id="row-${ch.id}">
      <td class="tn sub-indent">${priHtml(ch.priority)}<span>${h(ch.name)}</span></td>
      <td class="tres">${h(ch.res||'—')}</td>
      <td class="tdt">${fd(ch.start)}</td>
      <td class="tdt${over?' ov':''}">${fd(ch.deadline)}${over?' ！':''}</td>
      <td><span class="chip ${sc(ch.status)}" onclick="cycSub('${aId}','${kId}','${t.id}','${ch.id}',event)">${si(ch.status)?si(ch.status)+' ':''}${sl(ch.status)}</span></td>
      <td class="tnote">${ch.note?h(ch.note).replace(/\n/g,'<br>'):''}</td>
      <td>${ccBadge(ch.id)}</td>
      <td class="tby">${h(ch._by||'')}</td>
      <td><div class="ta"><button class="ib" onclick="openEditSub('${aId}','${kId}','${t.id}','${ch.id}')">編集</button><button class="ib del" onclick="delSub('${aId}','${kId}','${t.id}','${ch.id}')">削除</button></div></td>
    </tr>`;
  });
  html+=`</table></td></tr>`;
  return html;
}

function rArea(id){
  const area=D.areas.find(a=>a.id===id);if(!area)return;
  const s=aStats(area);const c=COLORS[id]||'#52565E';
  const q=document.getElementById('si').value.toLowerCase();
  const fbar=`<div class="fbar">
    <span class="fl">Filter</span>
    <button class="fb ${fil==='ALL'?'active':''}" onclick="setF('ALL')">All (${s.total})</button>
    <button class="fb ${fil==='DONE'?'active':''}" onclick="setF('DONE')">Done (${s.done})</button>
    <button class="fb ${fil==='WIP'?'active':''}" onclick="setF('WIP')">WIP (${s.wip})</button>
    <button class="fb ${fil==='NOT_STARTED'?'active':''}" onclick="setF('NOT_STARTED')">Not Started (${s.ns})</button>
    <div class="fr" style="color:${c}">${s.done}/${s.total}</div>
  </div>`;
  const kpis=area.kpis.map((k,i)=>{
    let dn=0,tot2=0;k.tasks.forEach(t=>{const ts=taskStats(t);dn+=ts.done;tot2+=ts.total;});
    const pct=tot2?Math.round(dn/tot2*100):0;
    let tasks=k.tasks.filter(t=>{
      if(fil!=='ALL'&&t.status!==fil)return false;
      if(q&&!t.name.toLowerCase().includes(q)&&!(t.res||'').toLowerCase().includes(q))return false;
      return true;
    });
    let rows='';let i2=0;
    while(i2<tasks.length){
      const t=tasks[i2];const grp=t.group||'';
      let span=1;if(grp){while(i2+span<tasks.length&&tasks[i2+span].group===grp)span++;}
      const grpHtml=`<td class="group-cell${grp?'':' empty'}" rowspan="${span}">${grp?`<span class="group-cell-label" style="border-left:3px solid ${c}">${h(grp)}</span>`:''}</td>`;
      rows+=taskRow(t,area.id,k.id,grpHtml,span,c,
        `cycTask('${area.id}','${k.id}','${t.id}',event)`,
        `openEdit('${area.id}','${k.id}','${t.id}')`,
        `delT('${area.id}','${k.id}','${t.id}')`
      );
      rows+=subRows(t,area.id,k.id,c);
      for(let j=1;j<span;j++){
        const tj=tasks[i2+j];
        rows+=taskRow(tj,area.id,k.id,'',1,c,
          `cycTask('${area.id}','${k.id}','${tj.id}',event)`,
          `openEdit('${area.id}','${k.id}','${tj.id}')`,
          `delT('${area.id}','${k.id}','${tj.id}')`
        );
        rows+=subRows(tj,area.id,k.id,c);
      }
      i2+=span;
    }
    return `<div class="kpi-block">
      <div class="kpi-head" onclick="togK('${k.id}')">
        <div class="kpi-idx" style="color:${c}">${String(i+1).padStart(2,'0')}</div>
        <div class="kpi-info"><div class="kpi-lbl">KPI ${i+1} / ${area.kpis.length}</div><div class="kpi-ttl">${h(k.name)}</div>${k.target?`<div class="kpi-target">Target: ${k.target} · Actual: ${k.actual}</div>`:''}</div>
        <div class="kpi-r"><div class="kpi-pct" style="color:${c}">${pct}%</div><div class="kpi-bar"><div class="kpi-bar-f" style="width:${pct}%;background:${c}"></div></div><div class="kpi-cnt">${dn}/${tot2} done</div></div>
        <div style="display:flex;align-items:center;border-left:1px solid var(--border);flex-shrink:0"><button class="ib" style="margin:0 6px;font-size:10px" onclick="event.stopPropagation();openEditKpi('${area.id}','${k.id}')">編集</button></div>
        <div class="kpi-chev open" id="cv-${k.id}">›</div>
      </div>
      <div class="kpi-body open" id="kb-${k.id}">
        <table class="tt">
          <thead><tr><th style="width:100px">大タスク</th><th>タスク名</th><th>担当者</th><th>開始日</th><th>締め切り</th><th>ステータス</th><th style="width:140px">備考</th><th style="width:80px">コメント</th><th>記入者</th><th></th></tr></thead>
          <tbody id="tb-${k.id}">${rows}</tbody>
          <tfoot><tr class="add-r"><td colspan="10"><button class="add-btn" onclick="openAdd('${area.id}','${k.id}')">+ タスクを追加...</button></td></tr></tfoot>
        </table>
      </div>
    </div>`;
  }).join('');
  document.getElementById('ct').innerHTML=fbar+kpis+`<div style="margin-top:4px"><button class="add-btn" style="font-size:12px;padding:10px 0" onclick="openAddKpi('${area.id}')">+ KPI を追加...</button></div>`+renderAreaProjects(area.id, c);
  // load comment counts async
  const allTids=[];
  area.kpis.forEach(k=>k.tasks.forEach(t=>{allTids.push(t.id);(t.children||[]).forEach(c=>allTids.push(c.id));}));
  if(allTids.length) loadCommentCounts(allTids).then(()=>{
    allTids.forEach(tid=>{document.querySelectorAll(`.cp-count`).forEach(el=>{if(el.getAttribute('onclick')?.includes(tid)){const n=_ccache[tid]||0;el.textContent=n>0?n+' コメント':'コメント';}});});
  });
}

function rFreeProject(id){
  const proj=D.freeProjects.find(p=>p.id===id);if(!proj)return;
  const s=pStats(proj);const c=proj.color||'#037EF3';
  const q=document.getElementById('si').value.toLowerCase();
  const tasks=proj.tasks.filter(t=>{
    if(fil!=='ALL'&&t.status!==fil)return false;
    if(q&&!t.name.toLowerCase().includes(q)&&!(t.res||'').toLowerCase().includes(q))return false;
    return true;
  });
  const fbar=`<div class="fbar">
    <span class="fl">Filter</span>
    <button class="fb ${fil==='ALL'?'active':''}" onclick="setF('ALL')">All (${s.total})</button>
    <button class="fb ${fil==='DONE'?'active':''}" onclick="setF('DONE')">Done (${s.done})</button>
    <button class="fb ${fil==='WIP'?'active':''}" onclick="setF('WIP')">WIP (${s.wip})</button>
    <button class="fb ${fil==='NOT_STARTED'?'active':''}" onclick="setF('NOT_STARTED')">Not Started (${s.ns})</button>
    <div class="fr" style="color:${c}">${s.done}/${s.total}</div>
    <button class="btn btn-sm" style="margin-left:8px" onclick="openEditProject('${proj.id}')">⚙ 編集</button>
  </div>`;

  // Group tasks
  let rows='';let i2=0;
  while(i2<tasks.length){
    const t=tasks[i2];const grp=t.group||'';
    let span=1;if(grp){while(i2+span<tasks.length&&tasks[i2+span].group===grp)span++;}
    const over=isOver(t.deadline)&&t.status!=='DONE';
    rows+=`<tr class="tr" id="frow-${t.id}">
      <td class="group-cell${grp?'':' empty'}" rowspan="${span}">${grp?`<span class="group-cell-label" style="border-left:3px solid ${c}">${h(grp)}</span>`:''}</td>
      <td class="tn">${h(t.name)}</td><td class="tres">${h(t.res||'—')}</td>
      <td class="tdt">${fd(t.start)}</td>
      <td class="tdt${over?' ov':''}">${fd(t.deadline)}${over?' ！':''}</td>
      <td><span class="chip ${sc(t.status)}" onclick="cycFT('${proj.id}','${t.id}',event)">${si(t.status)?si(t.status)+' ':''}${sl(t.status)}</span></td>
      <td class="tnote">${t.note?h(t.note).replace(/\n/g,'<br>'):`<span class="tnote-empty" onclick="openEditFT('${proj.id}','${t.id}')">+ メモ</span>`}</td>
      <td class="tby">${h(t._by||'')}</td>
      <td><div class="ta"><button class="ib" onclick="openEditFT('${proj.id}','${t.id}')">編集</button><button class="ib del" onclick="delFT('${proj.id}','${t.id}')">削除</button></div></td>
    </tr>`;
    for(let j=1;j<span;j++){
      const tj=tasks[i2+j];const overj=isOver(tj.deadline)&&tj.status!=='DONE';
      rows+=`<tr class="tr" id="frow-${tj.id}">
        <td class="tn">${h(tj.name)}</td><td class="tres">${h(tj.res||'—')}</td>
        <td class="tdt">${fd(tj.start)}</td>
        <td class="tdt${overj?' ov':''}">${fd(tj.deadline)}${overj?' ！':''}</td>
        <td><span class="chip ${sc(tj.status)}" onclick="cycFT('${proj.id}','${tj.id}',event)">${si(tj.status)?si(tj.status)+' ':''}${sl(tj.status)}</span></td>
        <td class="tnote">${tj.note?h(tj.note).replace(/\n/g,'<br>'):`<span class="tnote-empty" onclick="openEditFT('${proj.id}','${tj.id}')">+ メモ</span>`}</td>
        <td class="tby">${h(tj._by||'')}</td>
        <td><div class="ta"><button class="ib" onclick="openEditFT('${proj.id}','${tj.id}')">編集</button><button class="ib del" onclick="delFT('${proj.id}','${tj.id}')">削除</button></div></td>
      </tr>`;
    }
    i2+=span;
  }

  const emptyRow=tasks.length?'':`<tr><td colspan="9" style="padding:20px 16px;text-align:center;font-size:11px;color:var(--faint)">タスクがありません。「+ タスク追加」から追加してください。</td></tr>`;

  document.getElementById('ct').innerHTML=`
    ${fbar}
    <div style="background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden">
      <div style="background:${c};padding:16px 20px;display:flex;align-items:center;gap:16px">
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;letter-spacing:.04em">${h(proj.name)}</div>
          ${proj.desc?`<div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:3px">${h(proj.desc)}</div>`:''}
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:#fff">${s.pct}%</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.5)">${s.done}/${s.total} done</div>
        </div>
      </div>
      <table class="tt">
        <thead><tr><th style="width:100px">グループ</th><th>タスク名</th><th>担当者</th><th>開始日</th><th>締め切り</th><th>ステータス</th><th style="width:150px">備考</th><th>記入者</th><th></th></tr></thead>
        <tbody>${rows}${emptyRow}</tbody>
        <tfoot><tr class="add-r"><td colspan="9"><button class="add-btn" onclick="openAddFreeTask()">+ タスクを追加...</button></td></tr></tfoot>
      </table>
    </div>`;
}

function closeM(){
  document.getElementById('ov').classList.remove('open');
  editing=null;
}
function saveT(){
  const name=document.getElementById('fn').value.trim();
  if(!name){toast('タスク名を入力してください','err');return;}
  const obj={
    name,group:(document.getElementById('fg-input')?.value||'').trim(),
    res:document.getElementById('fr').value.trim(),
    start:document.getElementById('fs2').value,deadline:document.getElementById('fd').value,
    status:document.getElementById('fst').value,note:(document.getElementById('fnote')?.value||'').trim(),
    priority:document.getElementById('fpri').value||'',
    _by: currentUser?.displayName||currentUser?.email||'',
  };
  if(editing){
    const{aId,kId,tId}=editing;
    const a=D.areas.find(x=>x.id===aId),k=a.kpis.find(x=>x.id===kId);
    const newAId=document.getElementById('fa').value,newKId=document.getElementById('fk').value;
    if(aId!==newAId||kId!==newKId){
      const ti=k.tasks.findIndex(x=>x.id===tId);
      const[task]=k.tasks.splice(ti,1);
      const na=D.areas.find(x=>x.id===newAId),nk=na.kpis.find(x=>x.id===newKId);
      nk.tasks.push({...task,...obj});
    } else {
      const ti=k.tasks.findIndex(x=>x.id===tId);
      k.tasks[ti]={...k.tasks[ti],...obj};
    }
    logAction('edit',`「${name}」を更新`);
    toast('更新しました');
  } else {
    const aId=document.getElementById('fa').value,kId=document.getElementById('fk').value;
    const a=D.areas.find(x=>x.id===aId),k=a.kpis.find(x=>x.id===kId);
    k.tasks.push({id:gid(),...obj,children:[]});
    logAction('add',`「${name}」を${aId}/${kId}に追加`);
    toast('追加しました');
  }
  save();buildNav();closeM();
  if(view==='dashboard')rDash();else if(view==='gantt')rGantt();else if(aid)rArea(aid);
}
function delEditingTask(){
  if(!editing)return;
  if(!confirm('削除しますか？'))return;
  const{aId,kId,tId}=editing;
  delT(aId,kId,tId);closeM();
}
function delT(aId,kId,tId){
  if(!editing && !confirm('削除しますか？'))return;
  const a=D.areas.find(x=>x.id===aId),k=a.kpis.find(x=>x.id===kId);
  const t=k.tasks.find(x=>x.id===tId);
  k.tasks=k.tasks.filter(x=>x.id!==tId);
  save();buildNav();
  if(view==='dashboard')rDash();else if(view==='gantt')rGantt();else if(aid)rArea(aid);
  logAction('del',`「${t?.name||tId}」を削除`);
  toast('削除しました');
}

  if(_cpUnsub)_cpUnsub();
  if(db){
    _cpUnsub=db.collection('comments').where('taskId','==',tId).orderBy('ts','asc').onSnapshot(snap=>{
      _ccache[tId]=snap.size;
      const list=document.getElementById('cp-list');
      if(!snap.size){list.innerHTML='<div class="cp-empty">コメントはまだありません</div>';return;}
      list.innerHTML=snap.docs.map(d=>{
        const c=d.data();
        const initials=(c.who||'?').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
        return `<div class="cp-msg">
          <div class="cp-avatar">${initials}</div>
          <div class="cp-bubble">
            <div class="cp-who">${h(c.who||'')}</div>
            <div class="cp-text">${h(c.text||'').replace(/\n/g,'<br>')}</div>
            <div class="cp-when">${c.ts?.toDate?new Date(c.ts.toDate()).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'...'}</div>
          </div>
        </div>`;
      }).join('');
      list.scrollTop=list.scrollHeight;
    },err=>{console.error('comments listener',err);});
  } else {
    document.getElementById('cp-list').innerHTML='<div class="cp-empty">Firestoreに接続されていません</div>';
  }
}
function closeComments(){
  document.getElementById('cp').classList.remove('open');
  document.getElementById('cp-overlay').classList.remove('open');
  if(_cpUnsub){_cpUnsub();_cpUnsub=null;}
  _cpTaskId=null;
}
async function postComment(){
  const text=document.getElementById('cp-input').value.trim();
  if(!text||!_cpTaskId)return;
  if(!db){toast('Firestoreに接続されていません','err');return;}
  if(!currentUser){toast('ログインが必要です','err');return;}
  document.getElementById('cp-input').value='';
  try{
    await db.collection('comments').add({
      taskId:_cpTaskId,
      text,
      who:currentUser.displayName||currentUser.email||'Unknown',
      email:currentUser.email||'',
      ts:firebase.firestore.FieldValue.serverTimestamp(),
    });
    _ccache[_cpTaskId]=(_ccache[_cpTaskId]||0)+1;
  }catch(err){
    console.error('postComment',err);
    toast('送信に失敗しました','err');
    document.getElementById('cp-input').value=text;
  }
}

// ── GANTT ──
const G_START=new Date(2026,1,1),G_END=new Date(2026,8,30),G_MS=G_END-G_START;
const MONTH_DATA=[{name:'2月',days:28,mi:1},{name:'3月',days:31,mi:2},{name:'4月',days:30,mi:3},{name:'5月',days:31,mi:4},{name:'6月',days:30,mi:5},{name:'7月',days:31,mi:6},{name:'8月',days:31,mi:7},{name:'9月',days:30,mi:8}];
function gPct(s){if(!s)return null;const d=new Date(s);if(isNaN(d))return null;return Math.max(0,Math.min(100,(d-G_START)/G_MS*100));}
function buildDayTicks(){let h='';const ticks=[1,5,10,15,20,25];MONTH_DATA.forEach(m=>ticks.forEach(d=>{if(d>m.days)return;const p=gPct(`2026-${String(m.mi).padStart(2,'0')}-${String(d).padStart(2,'0')}`);if(p===null)return;h+=`<div class="g-day-tick" style="left:${p}%"><div class="g-day-tick-line"></div><div class="g-day-label">${d}</div></div>`;}));return h;}

function rGantt(){
  const todayPct=Math.max(0,Math.min(100,(new Date()-G_START)/G_MS*100));
  const aFiltered=gfil==='ALL'?D.areas:D.areas.filter(a=>a.id===gfil);
  const gridLines=MONTH_DATA.map(m=>`<div class="g-grid-col" style="flex:${m.days}"></div>`).join('');
  const aFilterBtns=`<div class="gantt-filter">
    <button class="gfb ${gfil==='ALL'?'active':''}" onclick="setGF('ALL')">全エリア</button>
    ${D.areas.map(a=>`<button class="gfb ${gfil===a.id?'active':''}" onclick="setGF('${a.id}')">${a.id}</button>`).join('')}
    ${D.freeProjects.map(p=>`<button class="gfb ${gfil==='fp-'+p.id?'active':''}" onclick="setGF('fp-${p.id}')" style="border-color:${p.color}33">${p.name.slice(0,8)}</button>`).join('')}
  </div>`;

  function bar(t,c){
    const r=gPct(t.deadline);if(r===null)return null;
    const tp=Math.max(0,Math.min(100,(new Date()-G_START)/G_MS*100));
    if(t.status==='DONE'){const l=gPct(t.start||t.deadline)||r;return `<div class="g-bar" style="left:${l}%;width:${Math.max(.4,r-l)}%;background:#00C16E;opacity:.7;top:50%;transform:translateY(-50%);height:12px" title="${h(t.name)}"></div>`;}
    const over=r<tp;
    if(over)return `<div class="g-bar" style="left:${r-.5}%;width:3px;background:#F85A40;opacity:.9;top:50%;transform:translateY(-50%);height:14px" title="${h(t.name)} 期限切れ"></div>`;
    return `<div class="g-bar" style="left:${tp}%;width:${Math.max(.4,r-tp)}%;background:${t.status==='WIP'?c:'#CACCD1'};opacity:${t.status==='NOT_STARTED'?.5:1};top:50%;transform:translateY(-50%);height:14px" title="${h(t.name)}"></div>`;
  }

  let rows='';
  aFiltered.forEach(a=>{
    const c=COLORS[a.id]||'#52565E';const st=aStats(a);
    rows+=`<div class="g-area-row" style="background:${c}">
      <div class="g-area-hd" style="background:${c}"><span class="g-area-label" style="color:#fff">${a.id}</span><span class="g-area-count" style="color:rgba(255,255,255,.6)">${st.done}/${st.total}</span><span style="margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:16px;color:rgba(255,255,255,.9)">${st.pct}%</span></div>
      <div class="g-area-res" style="background:${c}88"></div>
      <div class="g-area-chart" style="background:${c}18"><div class="g-grid">${gridLines}</div><div class="g-today" style="left:${todayPct}%"></div></div>
    </div>`;
    a.kpis.forEach(k=>k.tasks.forEach(t=>{
      const b=bar(t,c);if(!b)return;
      const over=isOver(t.deadline)&&t.status!=='DONE';
      rows+=`<div class="g-row">
        <div class="g-name" onclick="goToTask('${a.id}','${k.id}','${t.id}')">
          <span class="chip ${sc(t.status)}" style="font-size:9px;padding:2px 6px;flex-shrink:0">${si(t.status)||'·'}</span>
          <span class="g-name-txt" title="${h(t.name)}">${h(t.name)}</span>${over?'<span style="color:var(--danger);font-size:10px;flex-shrink:0">！</span>':''}
        </div>
        <div class="g-res">${h(t.res||'—')}</div>
        <div class="g-chart"><div class="g-grid">${gridLines}</div><div class="g-today" style="left:${todayPct}%"></div>${b}</div>
      </div>`;
    }));
  });

  // Free projects in gantt
  const fpFiltered = gfil==='ALL' ? D.freeProjects : (gfil.startsWith('fp-') ? D.freeProjects.filter(p=>p.id===gfil.replace('fp-','')) : []);
  fpFiltered.forEach(proj=>{
    const c=proj.color||'#037EF3';const ps=pStats(proj);
    rows+=`<div class="g-area-row" style="background:${c}">
      <div class="g-area-hd" style="background:${c}"><span class="g-area-label" style="color:#fff;font-size:16px">${h(proj.name.slice(0,10))}</span><span style="margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:16px;color:rgba(255,255,255,.9)">${ps.pct}%</span></div>
      <div class="g-area-res" style="background:${c}88"></div>
      <div class="g-area-chart" style="background:${c}18"><div class="g-grid">${gridLines}</div><div class="g-today" style="left:${todayPct}%"></div></div>
    </div>`;
    proj.tasks.forEach(t=>{
      const b=bar(t,c);if(!b)return;
      const over=isOver(t.deadline)&&t.status!=='DONE';
      rows+=`<div class="g-row">
        <div class="g-name" onclick="sw('fp-${proj.id}',null)">
          <span class="chip ${sc(t.status)}" style="font-size:9px;padding:2px 6px;flex-shrink:0">${si(t.status)||'·'}</span>
          <span class="g-name-txt" title="${h(t.name)}">${h(t.name)}</span>${over?'<span style="color:var(--danger);font-size:10px;flex-shrink:0">！</span>':''}
        </div>
        <div class="g-res">${h(t.res||'—')}</div>
        <div class="g-chart"><div class="g-grid">${gridLines}</div><div class="g-today" style="left:${todayPct}%"></div>${b}</div>
      </div>`;
    });
  });

  document.getElementById('ct').innerHTML=`
    <div class="gantt-wrap">
      <div class="gantt-toolbar">
        <div class="gantt-legend">
          <div class="gl-item"><div class="gl-dot" style="background:#00C16E"></div><span style="color:var(--done)">Done</span></div>
          <div class="gl-item"><div class="gl-dot" style="background:#F48924"></div><span style="color:var(--wip)">WIP</span></div>
          <div class="gl-item"><div class="gl-dot" style="background:#CACCD1"></div><span style="color:var(--dim)">NS</span></div>
          <div class="gl-item"><div class="gl-dot" style="background:#F85A40;width:3px;height:16px;border-radius:1px"></div><span style="color:var(--danger)">今日</span></div>
        </div>
        ${aFilterBtns}
      </div>
      <div class="gantt-scroll"><div class="gantt-inner">
        <div class="gantt-head">
          <div class="g-name-hd">タスク名</div><div class="g-res-hd">担当者</div>
          <div class="g-timeline-hd">
            <div class="g-month-row">${MONTH_DATA.map(m=>`<div class="g-month-hd" style="flex:${m.days}">${m.name}</div>`).join('')}</div>
            <div class="g-day-row">${buildDayTicks()}<div class="g-today" style="left:${todayPct}%;height:100%;opacity:.5"></div></div>
          </div>
        </div>
        ${rows}
      </div></div>
    </div>`;
}

function setGF(id){gfil=id;rGantt();}
function goToTask(aId,kId,tId){
  sw('area-'+aId,null);
  setTimeout(()=>{
    const b=document.getElementById('kb-'+kId),cv=document.getElementById('cv-'+kId);
    if(b&&!b.classList.contains('open')){b.classList.add('open');if(cv)cv.classList.add('open');}
    const row=document.getElementById('row-'+tId);
    if(row){row.scrollIntoView({behavior:'smooth',block:'center'});const c=COLORS[aId]||'#037EF3';row.style.transition='background .3s';row.style.background=c+'22';setTimeout(()=>{row.style.background='';},1800);}
  },120);
}

// ── IMPORT / EXPORT ──
function exportD(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='action-tracker-2627.json';a.click();URL.revokeObjectURL(u);toast('エクスポートしました');}
function importD(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{D=JSON.parse(ev.target.result);migrate();save();buildNav();sw('dashboard',null);toast('インポートしました');}catch(err){toast('ファイルエラー','err');}};r.readAsText(f);e.target.value='';}

function toast(msg,t=''){const el=document.createElement('div');el.className='toast'+(t?' '+t:'');el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeM();closeMKpi();closeMProj();closeMFT();}
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('si').focus();}
});
['ov','ov-kpi','ov-proj','ov-ft','ov-sub'].forEach(id=>{
  const el=document.getElementById(id);
  if(el) el.addEventListener('click',function(e){if(e.target===this){closeM();closeMKpi();closeMProj();closeMFT();}});
});

// ══════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════
let appInitialized = false;

function initApp(){
  if(appInitialized)return;
  appInitialized=true;
  load();buildNav();
  initSync();
  document.querySelector('.nav-item[data-view="dashboard"]')?.classList.add('active');
  rDash();
}

(function boot(){
  auth.onAuthStateChanged(user=>{
    hideLoading();
    if(user && user.email && user.email.endsWith('@'+ALLOWED_DOMAIN)){
      currentUser=user;
      showScreen('app-root');
      document.getElementById('user-name').textContent  = user.displayName||'—';
      document.getElementById('user-email').textContent = user.email||'—';
      const av=document.getElementById('user-avatar');
      if(user.photoURL) av.innerHTML=`<img src="${user.photoURL}" alt="">`;
      else av.textContent=(user.displayName||user.email||'?')[0].toUpperCase();
      recordLogin(user);
      initApp();
    } else {
      currentUser=null;
      showScreen('auth-screen');
      appInitialized=false;
    }
  });
})();

async function signInWithGoogle(){
  const btn=document.getElementById('google-signin-btn');
  btn.disabled=true; setAuthError('');
  try{
    const result = await auth.signInWithPopup(_googleProvider);
    const email  = result.user.email||'';
    if(!email.endsWith('@'+ALLOWED_DOMAIN)){
      await auth.signOut();
      setAuthError(`@${ALLOWED_DOMAIN} のアカウントのみ許可されています（${email}）`);
    }
  }catch(e){
    if(e.code!=='auth/popup-closed-by-user') setAuthError('ログイン失敗: '+e.message);
  }finally{ btn.disabled=false; }
}
async function signOut(){
  if(!confirm('ログアウトしますか？'))return;
  await auth.signOut();toast('ログアウトしました');
}
