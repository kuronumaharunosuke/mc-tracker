    <!DOCTYPE html>
    <html lang="ja">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Action Tracker 2627</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
    :root {
    --bg:      #F3F4F7;
    --bg2:     #EAEBF0;
    --border:  #CACCD1;
    --text:    #52565E;
    --dim:     #8A8E96;
    --faint:   #CACCD1;
    --white:   #ffffff;
    --dark:    #2e3138;
    --done:    #00C16E;
    --done-bg: #E5F9F0;
    --wip:     #F48924;
    --wip-bg:  #FEF3E8;
    --ns-bg:   #F3F4F7;
    --danger:  #F85A40;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{font-size:14px;}
    body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;}
    .app{display:flex;min-height:100vh;}

    /* SIDEBAR */
    .sidebar{width:200px;min-width:200px;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;background:var(--dark);z-index:100;overflow-y:auto;}
    .logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,0.08);}
    .logo-eye{font-size:8px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:6px;}
    .logo-title{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:#fff;letter-spacing:0.04em;}
    .logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);margin-top:5px;}
    .nav{flex:1;padding-top:6px;}
    .nav-label{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:10px 16px 4px;}
    .nav-item{display:flex;align-items:center;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:700;gap:9px;color:rgba(255,255,255,0.55);transition:background 0.1s,color 0.1s;border-left:3px solid transparent;}
    .nav-item:hover{background:rgba(255,255,255,0.07);color:#fff;}
    .nav-item.active{background:rgba(255,255,255,0.1);color:#fff;}
    .nav-item.active .nb{color:rgba(255,255,255,0.4);}
    .ndot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
    .nb{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.28);}
    .sidebar-foot{border-top:1px solid rgba(255,255,255,0.08);padding:12px;display:flex;flex-direction:column;gap:6px;}

    /* TOPBAR */
    .main{margin-left:200px;flex:1;}
    .topbar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(82,86,94,0.06);}
    .topbar-l{display:flex;align-items:center;gap:12px;}
    .page-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.04em;color:var(--dark);line-height:1;}
    .page-sub{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);}
    .topbar-r{display:flex;align-items:center;gap:8px;}
    .search-box{display:flex;align-items:center;gap:8px;border:1.5px solid var(--border);background:var(--bg);padding:6px 12px;border-radius:6px;transition:border-color 0.1s;}
    .search-box:focus-within{border-color:var(--text);}
    .search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Lato',sans-serif;font-size:12px;width:160px;}
    .search-box input::placeholder{color:var(--faint);}
    .btn{font-family:'Lato',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;padding:7px 16px;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text);border-radius:6px;transition:all 0.1s;}
    .btn:hover{border-color:var(--text);background:var(--bg);}
    .btn-fill{background:var(--dark);color:#fff;border-color:var(--dark);}
    .btn-fill:hover{background:#3d4350;border-color:#3d4350;}

    /* CONTENT */
    .content{padding:28px;}

    /* DASHBOARD */
    .dash-hero{background:var(--dark);border-radius:10px;padding:28px 32px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;}
    .dh-title{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:0.9;color:#fff;letter-spacing:0.04em;}
    .dh-title span{color:#FFC845;}
    .dh-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:10px;letter-spacing:0.06em;}
    .dh-right{text-align:right;}
    .dh-pct{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;color:#fff;}
    .dh-pct-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:0.12em;text-transform:uppercase;}
    .dh-total{font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px;}
    .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
    .stat-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:18px 20px;}
    .stat-n{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;}
    .stat-n.g{color:var(--done);} .stat-n.a{color:var(--wip);} .stat-n.d{color:var(--faint);}
    .stat-l{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-top:2px;}
    .section-label{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
    .area-tbl{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px;}
    .area-tbl th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.13em;color:var(--dim);text-align:left;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);}
    .area-tbl td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
    .area-tbl tr:last-child td{border-bottom:none;}
    .area-tbl tbody tr{cursor:pointer;transition:background 0.08s;}
    .area-tbl tbody tr:hover td{background:var(--bg);}
    .an{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.04em;}
    .prog-wrap{display:flex;align-items:center;gap:10px;}
    .prog-track{height:4px;background:var(--bg2);border-radius:2px;width:100px;position:relative;}
    .prog-fill{height:100%;border-radius:2px;position:absolute;left:0;top:0;}
    .prog-n{font-family:'Bebas Neue',sans-serif;font-size:18px;min-width:38px;}
    .bdn{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;}
    .gn{color:var(--done);} .an2{color:var(--wip);}
    .up-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .up-head{grid-column:1/-1;background:var(--dark);color:#fff;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:11px 16px;}
    .dl-card{padding:14px 16px;background:var(--white);cursor:default;}
    .dl-card:hover{background:var(--bg);}
    .dl-area{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;}
    .dl-task{font-size:13px;font-weight:700;margin-bottom:8px;line-height:1.4;}
    .dl-foot{display:flex;align-items:center;gap:8px;}
    .dl-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);}
    .dl-date.ov{color:var(--danger);font-weight:700;}

    /* CHIPS */
    .chip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:3px 9px;display:inline-flex;align-items:center;gap:5px;border-radius:4px;cursor:pointer;user-select:none;transition:opacity 0.1s;white-space:nowrap;border:none;}
    .chip:hover{opacity:0.78;}
    .chip.done{color:var(--done);background:var(--done-bg);}
    .chip.wip{color:var(--wip);background:var(--wip-bg);}
    .chip.ns{color:var(--dim);background:var(--ns-bg);}

    /* FILTER BAR */
    .fbar{display:flex;align-items:center;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
    .fl{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-right:4px;}
    .fb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:5px 12px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);color:var(--dim);transition:all 0.08s;border-radius:5px;}
    .fb:hover{border-color:var(--text);color:var(--text);}
    .fb.active{background:var(--dark);color:#fff;border-color:var(--dark);}
    .fr{margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.04em;}

    /* KPI BLOCK */
    .kpi-block{background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden;}
    .kpi-head{display:flex;align-items:stretch;cursor:pointer;transition:background 0.08s;}
    .kpi-head:hover{background:var(--bg);}
    .kpi-idx{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;width:64px;text-align:center;border-right:1px solid var(--border);padding:12px 0;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);}
    .kpi-info{flex:1;padding:12px 16px;}
    .kpi-lbl{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint);margin-bottom:3px;}
    .kpi-ttl{font-size:13px;font-weight:700;line-height:1.4;color:var(--dark);}
    .kpi-target{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:3px;}
    .kpi-r{padding:12px 16px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:6px;flex-shrink:0;}
    .kpi-pct{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
    .kpi-bar{width:80px;height:4px;background:var(--bg2);border-radius:2px;}
    .kpi-bar-f{height:100%;border-radius:2px;}
    .kpi-cnt{font-size:10px;color:var(--dim);}
    .kpi-chev{width:40px;border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:18px;transition:transform 0.14s;flex-shrink:0;}
    .kpi-chev.open{transform:rotate(90deg);}

    /* TASK TABLE */
    .kpi-body{display:none;border-top:1px solid var(--border);}
    .kpi-body.open{display:block;}
    .tt{width:100%;border-collapse:collapse;}
    .tt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--dim);text-align:left;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg);}
    .tt td{padding:10px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
    .tr:last-child td{border-bottom:none;}
    .tr:hover td{background:var(--bg);}
    .tn{font-size:13px;font-weight:700;color:var(--dark);}
    .tres{font-size:11px;color:var(--dim);}
    .tdt{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);white-space:nowrap;}
    .tdt.ov{color:var(--danger);font-weight:700;}
    .ta{display:flex;gap:4px;opacity:0;transition:opacity 0.08s;}
    .tr:hover .ta{opacity:1;}
    .ib{font-size:11px;padding:4px 8px;border:1px solid var(--border);cursor:pointer;color:var(--dim);transition:all 0.08s;background:transparent;border-radius:4px;}
    .ib:hover{border-color:var(--text);color:var(--text);}
    .ib.del:hover{border-color:var(--danger);color:var(--danger);}
    .ib.sub-add{font-size:10px;padding:3px 7px;}
    .ib.sub-add:hover{border-color:var(--wip);color:var(--wip);}
    .add-r td{padding:9px 16px;border-bottom:none;}
    .add-btn{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:0.1em;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:color 0.08s;background:none;border:none;}
    .add-btn:hover{color:var(--text);}

    /* SUBTASK STYLES */
    .tr.child-row td{background:rgba(0,0,0,0.01);}
    .tr.child-row:hover td{background:var(--bg);}
    .tr.child-row .tn{font-size:12px;font-weight:400;color:var(--text);}
    .child-indent{padding-left:36px !important;}
    .parent-toggle{cursor:pointer;background:none;border:none;font-size:11px;color:var(--faint);padding:0 4px 0 0;transition:color 0.1s;line-height:1;}
    .parent-toggle:hover{color:var(--text);}
    .parent-toggle.open{transform:rotate(90deg);display:inline-block;}
    .child-prefix{color:var(--faint);margin-right:4px;font-size:12px;}
    .parent-label{font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:var(--bg2);color:var(--dim);padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle;}
    .group-cell{font-size:11px;font-weight:700;color:var(--dark);background:var(--bg);border-right:1px solid var(--border);padding:10px 12px;vertical-align:middle;max-width:120px;}
    .group-cell-label{writing-mode:horizontal-tb;text-align:center;background:var(--bg2);border-radius:4px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--text);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px;}
    .group-cell.empty{background:transparent;}

    /* ── GANTT ───────────────────────────────── */
    .gantt-wrap{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .gantt-toolbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap;}
    .gantt-legend{display:flex;align-items:center;gap:14px;font-size:11px;font-weight:700;margin-right:auto;}
    .gl-item{display:flex;align-items:center;gap:5px;}
    .gl-dot{width:10px;height:10px;border-radius:2px;}
    .gantt-filter{display:flex;align-items:center;gap:6px;}
    .gfb{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:4px 10px;border:1.5px solid var(--border);cursor:pointer;background:var(--white);color:var(--dim);transition:all 0.08s;border-radius:4px;}
    .gfb:hover{border-color:var(--text);color:var(--text);}
    .gfb.active{background:var(--dark);color:#fff;border-color:var(--dark);}

    .gantt-scroll{overflow-x:auto;}
    .gantt-inner{min-width:800px;}

    .gantt-head{display:flex;position:sticky;top:56px;z-index:20;background:var(--bg);border-bottom:2px solid var(--border);}
    .g-name-hd{width:260px;min-width:260px;padding:10px 16px;font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);border-right:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;}
    .g-res-hd{width:90px;min-width:90px;padding:10px 8px;font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);border-right:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;}
    .g-timeline-hd{flex:1;display:flex;flex-direction:column;}
    .g-month-row{display:flex;border-bottom:1px solid var(--border);}
    .g-month-hd{text-align:center;font-size:9px;font-weight:700;letter-spacing:0.1em;padding:8px 4px;color:var(--dim);border-right:1px solid var(--border);}
    .g-day-row{position:relative;height:22px;overflow:hidden;background:var(--bg);}
    .g-day-tick{position:absolute;transform:translateX(-50%);top:3px;display:flex;flex-direction:column;align-items:center;gap:1px;pointer-events:none;}
    .g-day-tick-line{width:1px;height:5px;background:var(--border);}
    .g-day-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);white-space:nowrap;line-height:1;}

    .g-area-row{display:flex;align-items:center;border-bottom:2px solid var(--border);border-top:2px solid var(--border);margin-top:4px;}
    .g-area-hd{width:260px;min-width:260px;padding:10px 16px;display:flex;align-items:center;gap:10px;border-right:1px solid var(--border);flex-shrink:0;}
    .g-area-label{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.06em;}
    .g-area-count{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;}
    .g-area-res{width:90px;min-width:90px;border-right:1px solid var(--border);flex-shrink:0;}
    .g-area-chart{flex:1;position:relative;height:36px;}

    .g-row{display:flex;align-items:center;border-bottom:1px solid var(--border);min-height:38px;transition:background 0.07s;}
    .g-row:hover{background:var(--bg);}
    .g-row:last-child{border-bottom:none;}
    .g-row.g-child{min-height:30px;background:rgba(0,0,0,0.01);}
    .g-row.g-child:hover{background:var(--bg);}
    .g-name{width:260px;min-width:260px;padding:7px 16px;font-size:12px;font-weight:700;color:var(--dark);border-right:1px solid var(--border);display:flex;align-items:center;gap:6px;overflow:hidden;flex-shrink:0;}
    .g-name.g-child-name{font-size:11px;font-weight:400;padding-left:32px;}
    .g-name-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .g-res{width:90px;min-width:90px;padding:7px 8px;font-size:10px;color:var(--dim);border-right:1px solid var(--border);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex-shrink:0;}
    .g-chart{flex:1;position:relative;height:38px;}
    .g-row.g-child .g-chart{height:30px;}
    .g-grid{position:absolute;inset:0;display:flex;pointer-events:none;}
    .g-grid-col{flex:1;border-right:1px solid var(--bg2);}
    .g-bar{position:absolute;height:18px;border-radius:3px;min-width:3px;transition:opacity 0.1s;}
    .g-bar:hover{opacity:0.8;}
    .g-row.g-child .g-chart .g-bar{height:12px;border-radius:2px;top:50%;transform:translateY(-50%);}
    .g-bar-wrap{position:absolute;inset:0;display:flex;align-items:center;padding:0 2px;}
    .g-today{position:absolute;top:0;bottom:0;width:2px;z-index:5;pointer-events:none;background:#F85A40;opacity:0.7;}
    .g-today-label{position:absolute;top:0;bottom:0;width:2px;background:#F85A40;z-index:10;pointer-events:none;}
    .g-today-label::after{content:'TODAY';position:absolute;top:4px;left:4px;font-size:8px;font-weight:700;letter-spacing:0.1em;color:#F85A40;white-space:nowrap;}

    /* NOTE CELL */
    .tnote{font-size:11px;color:var(--dim);line-height:1.4;max-width:180px;word-break:break-all;}
    .tnote-empty{color:var(--faint);font-size:10px;cursor:pointer;}
    .tnote-empty:hover{color:var(--text);}
    textarea.fi{resize:vertical;min-height:60px;font-size:12px;line-height:1.5;}

    /* MODAL */
    .overlay{position:fixed;inset:0;background:rgba(46,49,56,0.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
    .overlay.open{display:flex;}
    .modal{background:var(--white);border:1px solid var(--border);border-radius:10px;width:460px;max-width:calc(100vw - 32px);max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(46,49,56,0.2);animation:popIn 0.15s ease;}
    @keyframes popIn{from{opacity:0;transform:scale(0.96) translateY(8px)}to{opacity:1;transform:none}}
    .mh{background:var(--dark);color:#fff;padding:16px 20px;border-radius:10px 10px 0 0;font-size:14px;font-weight:900;letter-spacing:0.04em;text-transform:uppercase;}
    .mb{padding:20px;}
    .fg{margin-bottom:14px;}
    .fl2{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--dim);margin-bottom:5px;}
    .fi,.fs{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--dark);font-size:13px;font-family:'Lato',sans-serif;padding:8px 11px;outline:none;transition:border-color 0.1s;border-radius:6px;}
    .fi:focus,.fs:focus{border-color:var(--text);background:var(--white);}
    .fs{cursor:pointer;}
    option{background:var(--white);}
    .fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .mf{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--bg);border-radius:0 0 10px 10px;}
    .sub-banner{background:var(--wip-bg);border:1px solid #F4832444;border-radius:6px;padding:8px 12px;margin-bottom:14px;font-size:11px;color:var(--wip);font-weight:700;}

    /* TOAST */
    .toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:10px 16px;font-size:12px;font-weight:700;z-index:2000;animation:slideUp 0.18s ease;border-radius:6px;box-shadow:0 4px 16px rgba(46,49,56,0.2);}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    .toast.err{background:var(--danger);}

    ::-webkit-scrollbar{width:5px;height:5px;}

    function load(){
    try{const s=localStorage.getItem(SK);if(s){D=JSON.parse(s);migrateTasks();return;}}catch(e){}
    D=JSON.parse(JSON.stringify(SEED));
    }
    // Ensure all tasks have children array (migration for old data)
    function migrateTasks(){
    D.areas.forEach(a=>a.kpis.forEach(k=>{
        const flat=[];
        k.tasks.forEach(t=>{
        if(!t.group)t.group='';
        flat.push(t);
        // Flatten any children into flat task list with group = parent name
        if(t.children&&t.children.length){
            const grpName=t.name;
            t.children.forEach(c=>{
            if(!c.group)c.group=grpName;
            if(!c.children)c.children=[];
            flat.push(c);
            });
            t.children=[];
        }
        });
        k.tasks=flat;
    }));
    }
    function save(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}}
    function gid(){return 'x'+Date.now()+'_'+Math.random().toString(36).slice(2,5);}
    function h(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function fd(s){if(!s)return'—';const d=new Date(s);if(isNaN(d))return s;return(d.getMonth()+1)+'/'+(d.getDate());}
    function isOver(dl){if(!dl)return false;const d=new Date(dl);return !isNaN(d)&&d<new Date();}
    function sl(s){return s==='DONE'?'Done':s==='WIP'?'WIP':'Not Started';}
    function sc(s){return s==='DONE'?'done':s==='WIP'?'wip':'ns';}
    function si(s){return s==='DONE'?'✓':s==='WIP'?'◑':'';}

    // Count stats including children
    function taskStats(t){
    let d=0,w=0,n=0,tot=0;
    function count(x){
        tot++;
        if(x.status==='DONE')d++;
        else if(x.status==='WIP')w++;
        else n++;
        (x.children||[]).forEach(c=>count(c));
    }
    count(t);
    return{done:d,wip:w,ns:n,total:tot};
    }

    function aStats(area){
    let d=0,w=0,n=0,t=0;
    area.kpis.forEach(k=>k.tasks.forEach(task=>{
        const s=taskStats(task);d+=s.done;w+=s.wip;n+=s.ns;t+=s.total;
    }));
    return{done:d,wip:w,ns:n,total:t,pct:t?Math.round(d/t*100):0};
    }
    function totals(){
    let d=0,w=0,n=0,t=0;
    D.areas.forEach(a=>{const s=aStats(a);d+=s.done;w+=s.wip;n+=s.ns;t+=s.total;});
    return{done:d,wip:w,ns:n,total:t,pct:t?Math.round(d/t*100):0};
    }

    // Find task by id (including in children)
    function findTask(aId,kId,tId){
    const a=D.areas.find(x=>x.id===aId);if(!a)return null;
    const k=a.kpis.find(x=>x.id===kId);if(!k)return null;
    for(const t of k.tasks){
        if(t.id===tId)return{t,parent:null,list:k.tasks};
        for(let ci=0;ci<(t.children||[]).length;ci++){
        if(t.children[ci].id===tId)return{t:t.children[ci],parent:t,list:t.children};
        }
    }
    return null;
    }

    function rArea(id){
    const area=D.areas.find(a=>a.id===id);if(!area)return;
    const s=aStats(area);const c=COLORS[id]||'#52565E';
    const q=document.getElementById('si').value.toLowerCase();
    const fbar=`<div class="fbar">
        <span class="fl">Filter</span>
        <button class="fb ${fil==='ALL'?'active':''}" onclick="setF('ALL')">All (${s.total})</button>
        <button class="fb ${fil==='DONE'?'active':''}" onclick="setF('DONE')">Done (${s.done})</button>
        <button class="fb ${fil==='WIP'?'active':''}" onclick="setF('WIP')">WIP (${s.wip})</button>
        <button class="fb ${fil==='NOT_STARTED'?'active':''}" onclick="setF('NOT_STARTED')">Not Started (${s.ns})</button>
        <div class="fr" style="color:${c}">${s.done}/${s.total}</div>
    </div>`;

    const kpis=area.kpis.map((k,i)=>{
        const ts_raw=taskStats_kpi(k);
        const dn=ts_raw.done,tot2=ts_raw.total;
        const pct=tot2?Math.round(dn/tot2*100):0;

        // Filter tasks
        let tasks=k.tasks.filter(t=>{
        if(fil!=='ALL'&&t.status!==fil)return false;
        if(q&&!t.name.toLowerCase().includes(q)&&!(t.res||'').toLowerCase().includes(q)&&!(t.group||'').toLowerCase().includes(q))return false;
        return true;
        });

        // Build rows with group (大タスク) column using rowspan
        // Group consecutive tasks with the same group name
        let rows='';

        while(i2<tasks.length){
        const t=tasks[i2];
        const grp=t.group||'';
        // Count how many consecutive tasks share this group label
        let span=1;
        if(grp){
            while(i2+span<tasks.length&&tasks[i2+span].group===grp)span++;
        }
        const over=isOver(t.deadline)&&t.status!=='DONE';
        // First row in group: show group cell with rowspan

        </tr>`;
        // Remaining rows in same group (no group cell - it's rowspan'd)
        for(let j=1;j<span;j++){
            const tj=tasks[i2+j];
            const overj=isOver(tj.deadline)&&tj.status!=='DONE';
            rows+=`<tr class="tr" id="row-${tj.id}">
            <td class="tn">${h(tj.name)}</td>
            <td class="tres">${h(tj.res||'—')}</td>

            <td><div class="ta">
                <button class="ib" onclick="openEdit('${area.id}','${k.id}','${tj.id}')">編集</button>
                <button class="ib del" onclick="delT('${area.id}','${k.id}','${tj.id}',null)">削除</button>
            </div></td>
            </tr>`;
        }

        }

        <div class="kpi-head" onclick="togK('${k.id}')">

    /* ── DAY TICKS ─── */
    function buildDayTicks(){
    let html='';
    const tickDays=[1,5,10,15,20,25];
    MONTH_DATA.forEach(m=>{
        tickDays.forEach(d=>{
        if(d>m.days)return;
        const dateStr=`2026-${String(m.mi).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const pct=gPct(dateStr);
        if(pct===null)return;
        html+=`<div class="g-day-tick" style="left:${pct}%"><div class="g-day-tick-line"></div><div class="g-day-label">${d}</div></div>`;
        });
    });
    return html;
    }

    /* ── GO TO TASK (gantt → area) ─── */
    function goToTask(aId,kId,tId){
    // Navigate to area view
    sw('area-'+aId,null);
    // After render, find KPI, ensure open, scroll to task row
    setTimeout(()=>{
        // Open the KPI body if closed
        const kpiBody=document.getElementById('kb-'+kId);
        const kpiChev=document.getElementById('cv-'+kId);
        if(kpiBody&&!kpiBody.classList.contains('open')){
        kpiBody.classList.add('open');
        if(kpiChev)kpiChev.classList.add('open');
        }
        // Expand subtask if needed
        const row=document.getElementById('row-'+tId);
        if(row){
        row.scrollIntoView({behavior:'smooth',block:'center'});
        const c=COLORS[aId]||'#037EF3';
        row.style.transition='background 0.3s';
        row.style.background=c+'22';
        setTimeout(()=>{row.style.background='';},1800);
        }
    },120);
    }


    const G_START=new Date(2026,1,1);
    const G_END  =new Date(2026,8,30);
    const G_MS   =G_END-G_START;
    const MONTH_DATA=[
    {name:'2月',days:28,mi:1},{name:'3月',days:31,mi:2},{name:'4月',days:30,mi:3},
    {name:'5月',days:31,mi:4},{name:'6月',days:30,mi:5},{name:'7月',days:31,mi:6},
    {name:'8月',days:31,mi:7},{name:'9月',days:30,mi:8},
    ];
    const MONTHS=MONTH_DATA.map(m=>m.name);

    function gPct(dateStr){
    if(!dateStr)return null;
    const d=new Date(dateStr);
    if(isNaN(d))return null;
    return Math.max(0,Math.min(100,(d-G_START)/G_MS*100));
    }

    function rGantt(){
    const todayPct=Math.max(0,Math.min(100,(new Date()-G_START)/G_MS*100));
    const areas=gfil==='ALL'?D.areas:D.areas.filter(a=>a.id===gfil);
    const aFilterBtns=`<div class="gantt-filter">
        <button class="gfb ${gfil==='ALL'?'active':''}" onclick="setGF('ALL')">全エリア</button>
        ${D.areas.map(a=>`<button class="gfb ${gfil===a.id?'active':''}" onclick="setGF('${a.id}')" style="${gfil===a.id?'':'border-color:'+COLORS[a.id]+'22'}">${a.id}</button>`).join('')}
    </div>`;

    let rowsHtml='';
    const gridLines=MONTH_DATA.map(m=>`<div class="g-grid-col" style="flex:${m.days}"></div>`).join('');

    function renderGBar(t,c,isChild){
        // Bar: today → deadline (remaining period)
        const r=gPct(t.deadline);
        if(r===null)return null; // no deadline = no bar
        const todayPctLocal=Math.max(0,Math.min(100,(new Date()-G_START)/G_MS*100));
        const isDone=t.status==='DONE';
        // For DONE tasks, show start→deadline as thin completed bar
        if(isDone){
        const l=gPct(t.start||t.deadline);
        const left=l!==null?l:r;
        const width=Math.max(0.4,r-left);
        const h2=isChild?8:12;
        return `<div class="g-bar done"
            style="left:${left}%;width:${width}%;background:#00C16E;opacity:0.7;top:50%;transform:translateY(-50%);height:${h2}px"
            title="${h(t.name)} 完了 (〜${fd(t.deadline)})"></div>`;
        }
        // Not done: bar from today to deadline
        const left=Math.min(todayPctLocal,r);
        const width=Math.max(0.4,r-todayPctLocal);
        const isOverdue=r<todayPctLocal; // deadline already passed
        const barColor=isOverdue?'#F85A40':t.status==='WIP'?c:'#CACCD1';
        const barOpacity=t.status==='NOT_STARTED'?'0.5':'1';
        const h2=isChild?8:14;
        if(isOverdue){
        // Past deadline: small red marker at deadline position
        return `<div class="g-bar ns"
            style="left:${r-0.5}%;width:3px;background:#F85A40;opacity:0.9;top:50%;transform:translateY(-50%);height:${h2+2}px;border-radius:2px"
            title="${h(t.name)} 期限切れ (${fd(t.deadline)})"></div>`;
        }
        return `<div class="g-bar ${sc(t.status)}"
        style="left:${todayPctLocal}%;width:${width}%;background:${barColor};opacity:${barOpacity};top:50%;transform:translateY(-50%);height:${h2}px"
        title="${h(t.name)} 今日〜${fd(t.deadline)}"></div>`;
    }

    areas.forEach(a=>{
        const c=COLORS[a.id]||'#52565E';
        const st=aStats(a);
        rowsHtml+=`
        <div class="g-area-row" style="background:${c};border-left:none">
            <div class="g-area-hd" style="background:${c}">
            <span class="g-area-label" style="color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.2)">${a.id}</span>
            <span class="g-area-count" style="color:rgba(255,255,255,0.7)">${st.done}/${st.total} done</span>
            <span style="margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:16px;color:rgba(255,255,255,0.9)">${st.pct}%</span>
            </div>
            <div class="g-area-res" style="background:${c}88"></div>
            <div class="g-area-chart" style="background:${c}18"><div class="g-grid">${gridLines}</div><div class="g-today" style="left:${todayPct}%"></div></div>
        </div>`;

        a.kpis.forEach(k=>{
        k.tasks.forEach(t=>{
            const barHtml=renderGBar(t,c,false);
            const over=isOver(t.deadline)&&t.status!=='DONE';
            const hasChildren=(t.children||[]).length>0;
            const isExp=expandedSubs.has(t.id+'_g');

            if(barHtml!==null){
            rowsHtml+=`
            <div class="g-row">
                <div class="g-name" style="cursor:pointer" onclick="goToTask('${a.id}','${k.id}','${t.id}')" title="エリアページで確認">
                ${hasChildren?`<button class="parent-toggle ${isExp?'open':''}" style="font-size:11px" onclick="event.stopPropagation();togSubG('${t.id}')" title="サブタスク${isExp?'非表示':'表示'}">${isExp?'▾':'▸'}</button>`:''}
                <span class="chip ${sc(t.status)}" style="font-size:9px;padding:2px 6px;flex-shrink:0" onclick="event.stopPropagation();cycTask('${a.id}','${k.id}','${t.id}',event)">${si(t.status)||'·'}</span>
                <span class="g-name-txt" style="color:var(--dark)" title="${h(t.name)}">${h(t.name)}</span>
                ${over?'<span style="color:var(--danger);font-size:10px;flex-shrink:0">！</span>':''}
                </div>
                <div class="g-res" title="${h(t.res||'')}">${h(t.res||'—')}</div>
                <div class="g-chart">
                <div class="g-grid">${gridLines}</div>
                <div class="g-today" style="left:${todayPct}%"></div>
                ${barHtml}
                </div>
            </div>`;
            }

            // Show children in gantt if expanded
            if(hasChildren && isExp){
            (t.children||[]).forEach(child=>{
                const cBar=renderGBar(child,c,true);
                if(cBar===null)return;
                const cOver=isOver(child.deadline)&&child.status!=='DONE';
                rowsHtml+=`
                <div class="g-row g-child">
                <div class="g-name g-child-name">
                    <span style="color:var(--faint);margin-right:4px">└</span>
                    <span class="chip ${sc(child.status)}" style="font-size:8px;padding:1px 5px;flex-shrink:0" onclick="cycTask('${a.id}','${k.id}','${child.id}',event)">${si(child.status)||'·'}</span>
                    <span class="g-name-txt" title="${h(child.name)}">${h(child.name)}</span>
                    ${cOver?'<span style="color:var(--danger);font-size:9px;flex-shrink:0">！</span>':''}
                </div>
                <div class="g-res" title="${h(child.res||'')}">${h(child.res||'—')}</div>
                <div class="g-chart">
                    <div class="g-grid">${gridLines}</div>
                    <div class="g-today" style="left:${todayPct}%"></div>
                    ${cBar}
                </div>
                </div>`;
            });
            }
        });
        });
    });

    document.getElementById('ct').innerHTML=`
        <div class="gantt-wrap">
        <div class="gantt-toolbar">
            <div class="gantt-legend">
            <div class="gl-item"><div class="gl-dot" style="background:#00C16E"></div><span style="color:var(--done)">Done</span></div>
            <div class="gl-item"><div class="gl-dot" style="background:#F48924"></div><span style="color:var(--wip)">WIP</span></div>
            <div class="gl-item"><div class="gl-dot" style="background:#CACCD1"></div><span style="color:var(--dim)">Not Started</span></div>
            <div class="gl-item"><div class="gl-dot" style="background:#F85A40;width:3px;height:16px;border-radius:1px"></div><span style="color:var(--danger)">今日</span></div>
            <div class="gl-item"><span style="color:var(--dim);font-size:10px">▸ でサブタスク展開</span></div>
            </div>
            ${aFilterBtns}
        </div>
        <div class="gantt-scroll">
            <div class="gantt-inner">
            <div class="gantt-head">
                <div class="g-name-hd">タスク名</div>
                <div class="g-res-hd">担当者</div>
                <div class="g-timeline-hd">
                <div class="g-month-row">${MONTH_DATA.map(m=>`<div class="g-month-hd" style="flex:${m.days}">${m.name}</div>`).join('')}</div>
                <div class="g-day-row">${buildDayTicks()}<div class="g-today" style="left:${todayPct}%;height:100%;opacity:0.5"></div></div>
                </div>
            </div>
            ${rowsHtml}
            </div>
        </div>
        </div>`;
    }

    function openEdit(aId,kId,tId){
    editingParent=null;
    const a=D.areas.find(x=>x.id===aId),k=a.kpis.find(x=>x.id===kId);
    let t=k.tasks.find(x=>x.id===tId);
    let isChild=false;let currentParentId='';
    if(!t){
        for(const p of k.tasks){
        const c=(p.children||[]).find(x=>x.id===tId);
        if(c){t=c;isChild=true;currentParentId=p.id;break;}
        }
    }
    if(!t)return;
    const hasChildren=(t.children||[]).length>0;
    editing={aId,kId,tId,isChild,currentParentId,hasChildren};
    document.getElementById('mttl').textContent='タスク編集';
    document.getElementById('sub-banner').style.display=isChild?'block':'none';

    document.getElementById('fn').value=t.name;
    document.getElementById('fg-input').value=t.group||'';

    document.getElementById('fd').value=t.deadline||'';

    const el=document.getElementById('fa');
    el.innerHTML=D.areas.map(a=>`<option value="${a.id}"${a.id===sa?' selected':''}>${a.id}</option>`).join('');
    el.disabled=false;

    function updK(fa,sk){
    const id=fa||document.getElementById('fa').value;
    const a=D.areas.find(x=>x.id===id);
    document.getElementById('fk').innerHTML=(a?a.kpis:[]).map(k=>`<option value="${k.id}"${k.id===sk?' selected':''}>${k.name.slice(0,40)}</option>`).join('');
    updP();
    refreshGroupList();
    }
    // Populate the datalist with distinct group names from the selected KPI
    function refreshGroupList(){
    const aId=document.getElementById('fa').value;
    const kId=document.getElementById('fk').value;
    const a=D.areas.find(x=>x.id===aId);
    const k=a?a.kpis.find(x=>x.id===kId):null;
    const dl=document.getElementById('fg-list');
    if(!dl||!k)return;
    const groups=[...new Set(k.tasks.map(t=>t.group||'').filter(Boolean))];
    dl.innerHTML=groups.map(g=>`<option value="${h(g)}">`).join('');
    }
    // Refresh parent task dropdown based on selected KPI and current editing context
    function updP(){
    const wrap=document.getElementById('fp-wrap');
    const sel=document.getElementById('fp');
    if(!wrap||!sel)return;
    // Hide parent selector when: adding subtask, or task has children
    if(editingParent){wrap.style.display='none';return;}
    const isChildEdit=editing&&editing.isChild;
    const aId=document.getElementById('fa').value;
    const kId=document.getElementById('fk').value;
    const a=D.areas.find(x=>x.id===aId);
    const k=a?a.kpis.find(x=>x.id===kId):null;
    if(!k){wrap.style.display='none';return;}
    // Get top-level tasks (excluding current task being edited)
    const editId=editing?editing.tId:null;
    const parents=k.tasks.filter(t=>t.id!==editId);
    if(parents.length===0&&!isChildEdit){wrap.style.display='none';return;}
    wrap.style.display='';
    const curParentId=editing?editing.currentParentId||'':'';
    sel.innerHTML=`<option value="">なし（トップレベル）</option>`+
        parents.map(t=>`<option value="${t.id}"${t.id===curParentId?' selected':''}>${h(t.name.length>40?t.name.slice(0,40)+'…':t.name)}</option>`).join('');
    }
    function closeM(){
    document.getElementById('ov').classList.remove('open');
    editing=null;editingParent=null;
    document.getElementById('fa').disabled=false;
    document.getElementById('fk').disabled=false;
    const fpWrap=document.getElementById('fp-wrap');
    if(fpWrap)fpWrap.style.display='none';
    }
    function saveT(){
    const name=document.getElementById('fn').value.trim();
    if(!name){toast('タスク名を入力してください','err');return;}
    const grpVal=(document.getElementById('fg-input')?.value||'').trim();
    const noteVal=(document.getElementById('fnote')?.value||'').trim();
    const obj={name,group:grpVal,res:document.getElementById('fr').value.trim(),start:document.getElementById('fs2').value,deadline:document.getElementById('fd').value,status:document.getElementById('fst').value,note:noteVal};

    if(editingParent){
        const{aId,kId,parentId}=editingParent;
        const a=D.areas.find(x=>x.id===aId),k=a.kpis.find(x=>x.id===kId);
        const parent=k.tasks.find(x=>x.id===parentId);
        if(!parent.children)parent.children=[];
        parent.children.push({id:gid(),...obj,children:[]});
        expandedSubs.add(parentId);
        toast('サブタスクを追加しました');
    } else if(editing){
        const{aId,kId,tId,isChild,currentParentId,hasChildren}=editing;
        const a=D.areas.find(x=>x.id===aId),k=a.kpis.find(x=>x.id===kId);
        const newParentId=(!hasChildren)?(document.getElementById('fp')?.value||''):'';
        const parentChanged=newParentId!==currentParentId;

        if(parentChanged){
        // Remove from current location
        if(isChild&&currentParentId){
            const oldParent=k.tasks.find(x=>x.id===currentParentId);
            if(oldParent)oldParent.children=(oldParent.children||[]).filter(x=>x.id!==tId);
        } else {
            k.tasks=k.tasks.filter(x=>x.id!==tId);
        }
        // Add to new location
        if(newParentId){
            const newParent=k.tasks.find(x=>x.id===newParentId);
            if(newParent){
            if(!newParent.children)newParent.children=[];
            newParent.children.push({id:tId,...obj,children:[]});
            expandedSubs.add(newParentId);
            }
        } else {
            // Move to top-level
            k.tasks.push({id:tId,...obj,children:[]});
        }
        } else if(isChild&&currentParentId){
        // Update in place (child)
        const parent=k.tasks.find(x=>x.id===currentParentId);
        if(parent){const ci=(parent.children||[]).findIndex(x=>x.id===tId);if(ci>=0)parent.children[ci]={...parent.children[ci],...obj};}
        } else {
        // Top-level update, check area/kpi change
        const newAId=document.getElementById('fa').value;
        const newKId=document.getElementById('fk').value;
        if(aId!==newAId||kId!==newKId){
            const ti=k.tasks.findIndex(x=>x.id===tId);
            const[task]=k.tasks.splice(ti,1);
            const na=D.areas.find(x=>x.id===newAId),nk=na.kpis.find(x=>x.id===newKId);
            nk.tasks.push({...task,...obj});
        } else {
            const ti=k.tasks.findIndex(x=>x.id===tId);
            k.tasks[ti]={...k.tasks[ti],...obj};
        }
        }
        toast('更新しました');
    } else {
        const aId=document.getElementById('fa').value,kId=document.getElementById('fk').value;
        const a=D.areas.find(x=>x.id===aId),k=a.kpis.find(x=>x.id===kId);
        const newParentId=document.getElementById('fp')?.value||'';
        if(newParentId){
        const parent=k.tasks.find(x=>x.id===newParentId);
        if(parent){if(!parent.children)parent.children=[];parent.children.push({id:gid(),...obj,children:[]});expandedSubs.add(newParentId);}
        toast('サブタスクを追加しました');
        } else {
        k.tasks.push({id:gid(),...obj,children:[]});
        toast('追加しました');
        }
    }
    save();buildNav();closeM();
    if(view==='dashboard')rDash();else if(view==='gantt')rGantt();else if(aid)rArea(aid);
    }

    function delT(aId,kId,tId,parentId){
    if(!confirm('削除しますか？'))return;
    const a=D.areas.find(x=>x.id===aId),k=a.kpis.find(x=>x.id===kId);
    if(parentId&&parentId!=='null'){
        // Delete child
        const parent=k.tasks.find(x=>x.id===parentId);
        if(parent)parent.children=(parent.children||[]).filter(x=>x.id!==tId);
    } else {
        k.tasks=k.tasks.filter(x=>x.id!==tId);
    }
    save();buildNav();
    if(view==='dashboard')rDash();else if(view==='gantt')rGantt();else if(aid)rArea(aid);
    toast('削除しました');
    }

    function importD(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{D=JSON.parse(ev.target.result);migrateTasks();save();buildNav();sw('dashboard',null);toast('インポートしました');}catch(err){toast('ファイルエラー','err');}};
    r.readAsText(f);e.target.value='';
    }

    /* ── KPI MODAL ─── */
    let editingKpi=null;
    function openAddKpi(aId){
    editingKpi=null;
    document.getElementById('kpi-mttl').textContent='KPI 追加';
    document.getElementById('kn').value='';
    document.getElementById('kt').value='';
    document.getElementById('kac').value='0';
    document.getElementById('kpi-del-btn').style.display='none';
    const el=document.getElementById('ka');
    el.innerHTML=D.areas.map(a=>`<option value="${a.id}"${a.id===(aId||aid)?'selected':''}>${a.id}</option>`).join('');
    document.getElementById('ov-kpi').classList.add('open');
    setTimeout(()=>document.getElementById('kn').focus(),80);
    }
    function openEditKpi(aId,kId){
    const a=D.areas.find(x=>x.id===aId),k=a.kpis.find(x=>x.id===kId);
    editingKpi={aId,kId};
    document.getElementById('kpi-mttl').textContent='KPI 編集';
    document.getElementById('kn').value=k.name;
    document.getElementById('kt').value=k.target||'';
    document.getElementById('kac').value=k.actual||'';
    document.getElementById('kpi-del-btn').style.display='';
    const el=document.getElementById('ka');
    el.innerHTML=D.areas.map(a2=>`<option value="${a2.id}"${a2.id===aId?'selected':''}>${a2.id}</option>`).join('');
    document.getElementById('ov-kpi').classList.add('open');
    }
    function closeMKpi(){document.getElementById('ov-kpi').classList.remove('open');editingKpi=null;}
    function saveKpi(){
    const name=document.getElementById('kn').value.trim();
    if(!name){toast('KPI名を入力してください','err');return;}
    const aId=document.getElementById('ka').value;
    const a=D.areas.find(x=>x.id===aId);
    const target=parseInt(document.getElementById('kt').value)||0;
    const actual=parseInt(document.getElementById('kac').value)||0;
    if(editingKpi){
        const sa=D.areas.find(x=>x.id===editingKpi.aId);
        const kidx=sa.kpis.findIndex(x=>x.id===editingKpi.kId);
        const existing=sa.kpis[kidx];
        if(editingKpi.aId!==aId){sa.kpis.splice(kidx,1);a.kpis.push({...existing,name,target,actual});}
        else sa.kpis[kidx]={...existing,name,target,actual};
        toast('KPIを更新しました');
    } else {
        a.kpis.push({id:gid(),name,target,actual,tasks:[]});
        toast('KPIを追加しました');
    }
    save();buildNav();closeMKpi();
    aid=aId;view='area-'+aId;buildNav();
    const ar=D.areas.find(x=>x.id===aId);
    document.getElementById('ptitle').textContent=ar.name;
    document.getElementById('psub').textContent='AREA · '+ar.kpis.length+' KPIs';
    document.getElementById('addbtn').style.display='';
    document.getElementById('addkpibtn').style.display='';
    rArea(aId);
    }
    function delKpi(){
    if(!editingKpi)return;
    const a=D.areas.find(x=>x.id===editingKpi.aId);
    const k=a.kpis.find(x=>x.id===editingKpi.kId);
    if(!confirm(`「${k.name}」を削除しますか？`))return;
    const savedAid=editingKpi.aId;
    a.kpis=a.kpis.filter(x=>x.id!==editingKpi.kId);
    save();buildNav();closeMKpi();
    document.getElementById('psub').textContent='AREA · '+a.kpis.length+' KPIs';
    rArea(savedAid);
    toast('KPIを削除しました');
    }

    function toast(msg,t=''){
    const el=document.createElement('div');el.className='toast'+(t?' '+t:'');el.textContent=msg;
    document.body.appendChild(el);setTimeout(()=>el.remove(),2600);
    }

    document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){closeM();closeMKpi();}
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('si').focus();}
    });
    document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeM();});
    document.getElementById('ov-kpi').addEventListener('click',function(e){if(e.target===this)closeMKpi();});

    load();buildNav();
    document.querySelector('.nav-item[data-view="dashboard"]')?.classList.add('active');
    rDash();
    </script>
    </body>
    </html>
